      /* ── Screen-only controls ── */
      .controls {
        max-width: 800px;
        margin: 20px auto;
        padding: 20px;
        background: #0f172a;
        color: #e5e7eb;
        border-radius: 12px;
        font-family: system-ui, sans-serif;
      }
      .controls h1 {
        margin: 0 0 4px;
        font-size: 20px;
        color: #60a5fa;
        text-align: center;
      }
      .controls p {
        margin: 0 0 14px;
        font-size: 12px;
        color: #94a3b8;
        text-align: center;
      }
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }
      .field {
        flex: 1;
        min-width: 160px;
      }
      .field label {
        display: block;
        font-size: 11px;
        color: #94a3b8;
        margin-bottom: 4px;
      }
      .field input {
        width: 100%;
        padding: 9px;
        border-radius: 8px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        background: rgba(15, 23, 42, 0.6);
        color: #e5e7eb;
        outline: none;
        font-size: 13px;
      }
      .printBtn {
        display: block;
        width: 100%;
        padding: 12px;
        margin-top: 4px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: rgba(16, 185, 129, 0.95);
        color: #fff;
        font-size: 14px;
        font-weight: 600;
      }

      /* ── Lab page (fixed A4 size) ── */
      .lab-page {
        width: 210mm;
        height: 297mm;
        margin: 32px auto;
        padding: 10mm;
        background: #fff;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
        color: #111;
      }
      .page-inner {
        border: 2px solid #222;
        width: 100%;
        height: 100%;
        padding: 5mm;
        box-sizing: border-box;
        overflow: hidden;
      }

      /* ── Common elements ── */
      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        border-bottom: 3px solid #111;
        padding-bottom: 6px;
        margin-bottom: 8px;
        font-size: 22px;
      }
      .student-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        font-size: 16px;
        margin-bottom: 10px;
      }
      .blank {
        display: inline-block;
        min-width: 160px;
        border-bottom: 1px solid #111;
      }
      .lab-title {
        font-size: 20px;
        font-weight: 700;
        margin: 6px 0;
      }
      .question {
        font-size: 17px;
        margin: 0 0 8px;
      }
      .label-out {
        font-size: 17px;
        font-style: italic;
        font-weight: 700;
        margin: 8px 0 5px;
      }

      .circuit-img {
        display: block;
        max-width: 55%;
        height: auto;
        margin: 6px auto;
      }

      .code-box {
        border: 1px solid #d1d5db;
        border-radius: 5px;
        background: #f3f4f6;
        padding: 10px;
        font-family: Consolas, "Courier New", monospace;
        font-size: 11.5px;
        line-height: 1.4;
        white-space: pre-wrap;
        word-break: break-all;
      }

      .terminal {
        border: 1px solid #d1d5db;
        border-radius: 5px;
        overflow: hidden;
        margin-top: 5px;
      }
      .terminal-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 5px 10px;
        background: #fdfdfd;
        border-bottom: 1px solid #d1d5db;
        font-family: system-ui, sans-serif;
        font-size: 13px;

        gap: 12px;
        color: #6b7280;
        font-size: 13px;
        user-select: none;
      }
      .terminal-body {
        margin: 0;
        padding: 10px;
        background: #fff;
        font-family: Consolas, "Courier New", monospace;
        font-size: 11px;
        line-height: 1.4;
        white-space: pre-wrap;
        word-break: break-all;
      }
      .warn-text {
        color: #b45309;
      }
      .sub-text {
        color: #6b7280;
      }

        height: auto;
        margin: 6px auto;
        border: 1px solid #d1d5db;
      }

        background: #f3f4f6;
        padding: 10px;
        font-family: Consolas, "Courier New", monospace;
        font-size: 12px;
        line-height: 1.4;
        white-space: pre-wrap;
      }
      .content-block {
        /* Atomic content wrapper — keeps blocks together */

          margin: 0;
          box-shadow: none;
          page-break-after: always;
        }
        .lab-page:last-child {
          page-break-after: auto;
        }
      }

een hardware elements (used with assign)\n\u2022 reg: stores values in procedural blocks (used inside always/initial)\n\u2022 integer, real, time: used for simulation and testbench purposes\n\nDesign Flow:\n1. Write Verilog source code (.v files) for modules and testbenches\n2. Compile using a simulator (e.g., iverilog -o output.vvp source.v)\n3. Run simulation (e.g., vvp output.vvp) to generate output and VCD files\n4. View timing diagrams using GTKWave (e.g., gtkwave output.vcd)\n",

      function esc(s) {
        return (s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function val(id, fallback) {
        var v = document.getElementById(id).value.trim();
        return v || fallback;
      }

      function slug(name) {
        var s = (name || "").replace(/[^a-zA-Z0-9]/g, "").slice(0, 16);
        return s || "Student";
      }

      function fill(text, tok) {
        var out = text || "";
        for (var k in tok) out = out.split(k).join(tok[k]);
        return out;
      }

      /* ── Pagination Engine ── */
      function paginateLab(container, labData) {
        var hdr = labData.hdr;
        var srow = labData.srow;
        var blocks = labData.blocks;
        var labId = labData.labId;
        var firstPage = true;

        function newPage() {
          var page = document.createElement("div");
          page.className = "lab-page";
          var inner = document.createElement("div");
          inner.className = "page-inner";

          // Always add header + student row
          var hdrEl = document.createElement("div");
          hdrEl.innerHTML = hdr + srow;
          while (hdrEl.firstChild) inner.appendChild(hdrEl.firstChild);

          if (!firstPage) {
            var contEl = document.createElement("div");
            contEl.className = "lab-title";
            contEl.textContent = "Lab " + labId + " (contd.)";
            inner.appendChild(contEl);
          }
          firstPage = false;

          page.appendChild(inner);
          container.appendChild(page);
          return inner;
        }

        var inner = newPage();

        for (var i = 0; i < blocks.length; i++) {
          var block = document.createElement("div");
          block.className = "content-block";
          block.innerHTML = blocks[i];
          inner.appendChild(block);

          // Check overflow: scrollHeight > clientHeight means it doesn't fit
          if (inner.scrollHeight > inner.clientHeight + 2) {
            // Remove from current page, create new page, add there
            inner.removeChild(block);
            inner = newPage();
            inner.appendChild(block);
          }
        }
      }

      function buildLabData(lab, tok, name, roll, sec) {
        var hdr =
          '<div class="page-header"><div>CSC 213: Computer Architecture</div><div>Lab Report</div></div>';
        var srow =
          '<div class="student-row">' +
          '<div>Student Name: <span class="blank">' +
          esc(name) +
          "</span></div>" +
          '<div>Roll No.: <span class="blank" style="min-width:100px">' +
          esc(roll) +
          "</span></div>" +
          '<div>Section: <span class="blank" style="min-width:80px">' +
          esc(sec) +
          "</span></div>" +
          "<div>Date: 2082/11/____</div></div>";

        var blocks = [];

        // Block: Title + Question
        blocks.push(
          '<div class="lab-title">Lab ' +
            esc(lab.id) +
            "</div>" +
            '<div class="question"><b>Q.</b> ' +
            esc(lab.question) +
            "</div>",
        );

        // Block: Circuit image
        if (lab.circuitImg) {
          blocks.push(
            '<img class="circuit-img" src="' +
              lab.circuitImg +
              '" alt="Circuit Diagram">',
          );
        }

        // Block: Theory
        if (lab.theory) {
          blocks.push(
            '<div class="label-out">Solution:</div>' +
              '<div class="theory-box">' +
              esc(lab.theory) +
              "</div>",
          );
        }

        // Block: Source Code
        if (lab.code) {
          blocks.push(
            '<div class="label-out">Source Code:</div>' +
              '<pre class="code-box">' +
              esc(fill(lab.code, tok)) +
              "</pre>",
          );

          // Block: Output terminal
          var outTitle =
            "Command Prompt - " +
            (lab.filebase || "lab" + lab.id) +
            (lab.isCpp ? ".exe" : ".out");
          var outBody = esc(fill(lab.output, tok));
          if (lab.isCpp) {
            outBody +=
              '\n\n<span class="warn-text">Process exited after 0.0234 seconds with return value 0</span>\n<span class="sub-text">Press any key to continue . . .</span>';
          }
          blocks.push(
            '<div class="label-out">Output:</div>' +
              '<div class="terminal">' +
              '<div class="terminal-bar">' +
              '<div style="display:flex;align-items:center;gap:6px">' +
              '<svg width="12" height="12" viewBox="0 0 16 16" fill="#000"><path d="M0 0h16v16H0z"/><path d="M3 5l3 3-3 3M7 11h4" stroke="#fff" fill="none" stroke-width="1.5"/></svg>' +
              "<span>" +
              esc(outTitle) +
              "</span></div>" +
              '<div class="icons"><span>&#x2012;</span><span>&#x25A1;</span><span>&#x2715;</span></div>' +
              "</div>" +
              '<pre class="terminal-body">' +
              outBody +
              "</pre></div>",
          );
        }

        // Block: Timing diagram images
        if (lab.needsTiming && lab.timingImgs) {
          var timingHtml = '<div class="label-out">Timing Diagram:</div>';
          for (var t = 0; t < lab.timingImgs.length; t++) {
            timingHtml +=
              '<img class="timing-img" src="' +
              lab.timingImgs[t] +
              '" alt="Timing Diagram">';
          }
          blocks.push(timingHtml);
        }

        return { hdr: hdr, srow: srow, labId: lab.id, blocks: blocks };
      }

      function render() {
        var name = val("nameIn", "______________________________");
        var roll = val("rollIn", "______________");
        var sec = val("secIn", "__________");
        var addr = val("addrIn", "YOUR_ADDRESS");
        var nameSlug = slug(document.getElementById("nameIn").value);

        var tok = {
          "{NAME}": name,
          "{ROLL}": roll,
          "{SECTION}": sec,
          "{ADDRESS}": addr,
          "{SLUG}": nameSlug,
        };

        // Build data for all labs
        var allLabsData = [];
        labs.forEach(function (lab) {
          allLabsData.push(buildLabData(lab, tok, name, roll, sec));
        });

        // Run pagination (places blocks into fixed-size pages)
        function doPagination() {
          var container = document.getElementById("pages");
          container.innerHTML = "";
          allLabsData.forEach(function (labData) {
            paginateLab(container, labData);
          });
        }

        // Initial render
        doPagination();

        // Re-paginate after images load (they affect block heights)
        var imgs = document.querySelectorAll(".circuit-img, .timing-img");
        var pending = 0;
        imgs.forEach(function (img) {
          if (!img.complete) pending++;
        });
        if (pending > 0) {
          imgs.forEach(function (img) {
            if (!img.complete) {
              img.onload = img.onerror = function () {
                pending--;
                if (pending <= 0) doPagination();
              };
            }
          });
        }
      }

      // Re-render on input change
      ["nameIn", "rollIn", "secIn", "addrIn"].forEach(function (id) {
        document.getElementById(id).addEventListener("input", render);
      });

      render();
    </script>
