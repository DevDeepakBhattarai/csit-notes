<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Operating System Lab Report Generator</title>
  <style>
    @page {
      size: A4;
      margin: 0;
    }

    * {
      box-sizing: border-box;
    }

    :root {
      --screen-bg: #101217;
      --panel: #181c24;
      --panel-2: #202633;
      --line: rgba(255, 255, 255, 0.12);
      --text: #eef2f6;
      --muted: #9aa6b5;
      --orange: #f47b20;
      --blue: #5294d0;
      --green: #2bb673;
      --paper: #ffffff;
      --ink: #121212;
      --paper-width: 210mm;
      --paper-height: 297mm;
      --paper-padding: 10mm;
      --page-border-padding: 5.5mm;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(244, 123, 32, 0.08), transparent 34%),
        linear-gradient(315deg, rgba(82, 148, 208, 0.10), transparent 36%),
        var(--screen-bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    .controls {
      max-width: 1120px;
      margin: 22px auto;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(24, 28, 36, 0.94);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
    }

    .controls-head {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: end;
      border-bottom: 1px solid var(--line);
      padding-bottom: 14px;
      margin-bottom: 14px;
    }

    .controls h1 {
      margin: 0;
      font-size: 23px;
      line-height: 1.2;
      color: #fff;
      letter-spacing: 0;
    }

    .controls p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .input-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(150px, 1fr));
      gap: 10px;
    }

    .field label {
      display: block;
      margin: 0 0 5px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .field input {
      width: 100%;
      padding: 10px 11px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: var(--panel-2);
      color: var(--text);
      outline: none;
      font-size: 13px;
    }

    .field input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(82, 148, 208, 0.16);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 14px;
    }

    .print-btn {
      border: 0;
      border-radius: 6px;
      background: var(--green);
      color: #fff;
      font-weight: 700;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 13px;
    }

    .print-btn:hover {
      filter: brightness(1.05);
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      color: var(--muted);
      font-size: 12px;
      user-select: none;
    }

    .theme-toggle input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .switch {
      width: 46px;
      height: 25px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: #343b49;
      position: relative;
      transition: background 0.2s ease;
    }

    .switch::after {
      content: "";
      position: absolute;
      width: 19px;
      height: 19px;
      top: 2px;
      left: 2px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.32);
      transition: transform 0.2s ease;
    }

    .theme-toggle input:checked + .switch {
      background: var(--blue);
    }

    .theme-toggle input:checked + .switch::after {
      transform: translateX(21px);
    }

    .pages {
      padding: 10px 0 36px;
      overflow-x: auto;
    }

    .report-page {
      width: var(--paper-width);
      height: var(--paper-height);
      margin: 24px auto;
      padding: var(--paper-padding);
      color: var(--ink);
      background: var(--paper);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.36);
      font-family: "Times New Roman", Times, serif;
      overflow: hidden;
    }

    .page-inner {
      height: 100%;
      border: 2px solid #202020;
      padding: var(--page-border-padding);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: #fff;
      min-height: 0;
    }

    .page-content {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .content-block {
      break-inside: avoid;
      page-break-inside: avoid;
      margin: 0 0 4.2mm;
    }

    .content-block:last-child {
      margin-bottom: 0;
    }

    .algorithm-block {
      margin-bottom: 1.8mm;
    }

    .question {
      margin: 0;
      font-size: 13pt;
      line-height: 1.38;
      font-weight: 700;
    }

    .section-title {
      font-size: 12pt;
      font-weight: 700;
      font-style: italic;
      margin: 0 0 1.7mm;
      color: #111;
    }

    .info-box,
    .algo-box {
      border: 1px solid #d3d6dc;
      border-radius: 5px;
      background: #f7f8fa;
      padding: 3mm;
      font-size: 12.5pt;
      line-height: 1.35;
    }

    .info-box p {
      margin: 0 0 2mm;
    }

    .info-box p:last-child {
      margin-bottom: 0;
    }

    .algo-box ol,
    .algo-box ul {
      margin: 0;
      padding-left: 5.2mm;
    }

    .algo-box li {
      margin: 0 0 1.3mm;
    }

    .plain-code {
      margin: 0;
      padding: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: normal;
      font-family: Consolas, "Courier New", monospace;
      font-size: 10pt;
      line-height: 1.26;
      color: #111;
      background: transparent;
      border: 0;
    }

    .source-code-first-block,
    .code-line-block {
      margin: 0;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .source-code-first-block .section-title {
      margin-bottom: 1.2mm;
    }

    .output-block {
      margin-top: 5mm;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .win-terminal {
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.24), 0 2px 8px rgba(0, 0, 0, 0.16);
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    .win-terminal.dark {
      background: #0c0c0c;
      color: #cccccc;
    }

    .win-terminal.dark .win-titlebar {
      background: #1f1f1f;
      border-bottom: 1px solid #333;
    }

    .win-terminal.dark .win-title-text,
    .win-terminal.dark .win-btn {
      color: #999;
    }

    .win-terminal.dark .t-process {
      color: #e5c07b;
    }

    .win-terminal.dark .t-press {
      color: #666;
    }

    .win-terminal.light {
      background: #fff;
      color: #1e1e1e;
      border: 1px solid #d4d4d4;
      box-shadow: none;
    }

    .win-terminal.light .win-titlebar {
      background: #f3f3f3;
      border-bottom: 1px solid #e0e0e0;
    }

    .win-terminal.light .win-title-text,
    .win-terminal.light .win-btn {
      color: #666;
    }

    .win-terminal.light .t-process {
      color: #9a6a00;
    }

    .win-terminal.light .t-press {
      color: #7a7a7a;
    }

    .win-titlebar {
      display: flex;
      align-items: center;
      height: 30px;
      user-select: none;
    }

    .win-title-text {
      flex: 1;
      font-size: 11px;
      padding-left: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .win-btns {
      display: flex;
      height: 100%;
    }

    .win-btn {
      width: 38px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
    }

    .win-btn svg {
      width: 10px;
      height: 10px;
    }

    .t-body {
      margin: 0;
      padding: 3mm 3.6mm;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-family: Consolas, "Courier New", monospace;
      font-size: 9.4pt;
      line-height: 1.34;
    }

    .index-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12pt;
      line-height: 1.22;
    }

    .index-title {
      margin: 0 0 2mm;
      text-align: center;
      font-size: 16pt;
      line-height: 1.2;
      font-weight: 700;
    }

    .index-subtitle {
      margin: 0 0 4mm;
      text-align: center;
      font-size: 11.5pt;
      font-weight: 700;
    }

    .index-table th,
    .index-table td {
      border: 1px solid #cfd4dc;
      padding: 1.2mm 2mm;
      vertical-align: middle;
    }

    .index-table th {
      background: #f0f3f7;
      text-align: left;
    }

    .index-table th:first-child,
    .index-table td:first-child {
      width: 18mm;
      text-align: center;
    }

    .index-table th:last-child,
    .index-table td:last-child {
      width: 34mm;
      text-align: center;
    }

    .submitted-date-cell {
      width: 30mm;
      text-align: center;
    }

    .signature-cell {
      height: 6.4mm;
    }

    @media (max-width: 900px) {
      .controls {
        margin: 12px;
      }

      .controls-head {
        display: block;
      }

      .input-grid {
        grid-template-columns: 1fr;
      }

      .report-page {
        width: var(--paper-width);
        height: var(--paper-height);
        min-height: 0;
        margin: 12px 0;
      }
    }

    @media print {
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      body {
        margin: 0;
        padding: 0;
        background: #fff;
      }

      .no-print {
        display: none !important;
      }

      .pages {
        padding: 0;
        overflow: visible;
      }

      .report-page {
        width: var(--paper-width);
        height: var(--paper-height);
        margin: 0;
        box-shadow: none;
        overflow: hidden;
        page-break-after: always;
        break-after: page;
      }

      .report-page:last-child {
        page-break-after: auto;
        break-after: auto;
      }
    }
  </style>
</head>
<body>
  <section class="controls no-print">
    <div class="controls-head">
      <div>
        <h1>Operating System Lab Report</h1>
        <p>Enter student details, choose output theme, then print or save as PDF. The report uses A4 pages and includes all OS lab part 1 answers.</p>
      </div>
      <button class="print-btn" type="button" onclick="window.print()">Print / Save as PDF</button>
    </div>
    <div class="input-grid">
      <div class="field">
        <label for="nameIn">Student Name</label>
        <input id="nameIn" type="text" placeholder="Your full name">
      </div>
      <div class="field">
        <label for="rollIn">Roll No.</label>
        <input id="rollIn" type="text" placeholder="Roll number">
      </div>
      <div class="field">
        <label for="sectionIn">Section</label>
        <input id="sectionIn" type="text" placeholder="Section">
      </div>
    </div>
    <div class="actions">
      <label class="theme-toggle">
        <input id="themeIn" type="checkbox" checked>
        <span class="switch"></span>
        <span>Dark output theme</span>
      </label>
    </div>
  </section>

  printf(\"P%d  %d  %d  %d  %d  %d   %d\\n\", p[i].pid, p[i].arrival, p[i].burst,\n        p[i].priority, p[i].completion, p[i].turnaround, p[i].waiting);\n    }\n    printf(\"Average Waiting Time: %.2f\\n\", totalWaiting / n);\n    printf(\"Average Turnaround Time: %.2f\\n\", totalTurnaround / n);\n\n    printf(\"\\nLab No.: 1(f)\\n\");\n    printf(\"Name: {NAME}\\n\");\n    printf(\"Roll No./Section: {ROLL}/{SECTION}\\n\");\n\n    return 0;\n}\n", "output": "Preemptive Priority Gantt Chart\nP1: 0 -\u003e 2\nP2: 2 -\u003e 6\nP4: 6 -\u003e 10\nP1: 10 -\u003e 15\nP3: 15 -\u003e 16\n\nPID AT BT PR CT TAT WT\nP1  0  7  3  15  15   8\nP2  2  4  1  6  4   0\nP3  4  1  4  16  12   11\nP4  5  4  2  10  5   1\nAverage Waiting Time: 5.00\nAverage Turnaround Time: 9.00\n\nLab No.: 1(f)\nName: {NAME}\nRoll No./Section: {ROLL}/{SECTION}"}, {"no": "2(a)", "title": "Banker's Algorithm", "question": "WAP to simulate Bankers Algorithm for multiple type of resources to decide safe/unsafe state.", "theory": ["Banker's Algorithm is a deadlock avoidance technique. It checks whether the system can allocate resources and still leave a safe sequence in which every process can finish."], "algorithm": ["Calculate the Need matrix as Max minus Allocation.", "Use Available as the initial Work vector.", "Repeatedly find an unfinished process whose Need is less than or equal to Work.", "Release that process allocation into Work and record the safe sequence.", "If no such process exists while processes remain, the state is unsafe."], "filename": "lab_2a_bankers_algorithm.c", "code": "#include \u003cstdio.h\u003e\n\nint canRun(int need[], int work[], int m) {\n    for (int i = 0; i \u003c m; i++) {\n        if (need[i] \u003e work[i]) {\n            return 0;\n        }\n    }\n    return 1;\n}\n\nvoid runBanker(const char *title, int available[]) {\n    int allocation[5][3] = {{0, 1, 0}, {2, 0, 0}, {3, 0, 2}, {2, 1, 1}, {0, 0, 2}};\n    int maximum[5][3] = {{7, 5, 3}, {3, 2, 2}, {9, 0, 2}, {2, 2, 2}, {4, 3, 3}};\n    int need[5][3], work[3], finish[5] = {0}, sequence[5], count = 0;\n    for (int i = 0; i \u003c 3; i++) {\n        work[i] = available[i];\n    }\n    for (int i = 0; i \u003c 5; i++) {\n        for (int j = 0; j \u003c 3; j++) {\n            need[i][j] = maximum[i][j] - allocation[i][j];\n        }\n    }\n\n    int progress = 1;\n    while (progress) {\n        progress = 0;\n        for (int i = 0; i \u003c 5; i++) {\n            if (!finish[i] \u0026\u0026 canRun(need[i], work, 3)) {\n                for (int j = 0; j \u003c 3; j++) {\n                    work[j] += allocation[i][j];\n                }\n                finish[i] = 1;\n                sequence[count++] = i;\n                progress = 1;\n            }\n        }\n    }\n\n    printf(\"%s\\nAvailable: \", title);\n    for (int i = 0; i \u003c 3; i++) {\n        printf(\"%d \", available[i]);\n    }\n    printf(\"\\n\");\n    if (count == 5) {\n        printf(\"System is in SAFE state.\\nSafe sequence: \");\n        for (int i = 0; i \u003c count; i++) {\n            printf(\"P%d \", sequence[i]);\n        }\n        printf(\"\\n\\n\");\n    } else {\n        printf(\"System is in UNSAFE state.\\n\\n\");\n    }\n}\n\nint main() {\n    int safeAvailable[] = {3, 3, 2};\n    int unsafeAvailable[] = {0, 0, 0};\n    runBanker(\"Case 1: Safe instance\", safeAvailable);\n    runBanker(\"Case 2: Unsafe instance\", unsafeAvailable);\n\n    printf(\"\\nLab No.: 2(a)\\n\");\n    printf(\"Name: {NAME}\\n\");\n    printf(\"Roll No./Section: {ROLL}/{SECTION}\\n\");\n\n    return 0;\n}\n", "output": "Case 1: Safe instance\nAvailable: 3 3 2 \nSystem is in SAFE state.\nSafe sequence: P1 P3 P4 P0 P2 \n\nCase 2: Unsafe instance\nAvailable: 0 0 0 \nSystem is in UNSAFE state.\n\n\nLab No.: 2(a)\nName: {NAME}\nRoll No./Section: {ROLL}/{SECTION}"}, {"no": "2(b)", "title": "Deadlock Detection Algorithm", "question": "WAP for simulating deadlock detection in the system having multiple type of resources. The program should list the deadlocked process in case of deadlock detection results true.", "theory": ["Deadlock detection checks the current allocation and request matrices to determine whether processes are permanently waiting for resources held by one another."], "algorithm": ["Set Work equal to Available.", "Mark a process finishable if its allocation is zero, otherwise mark it unfinished.", "Find an unfinished process whose outstanding request is less than or equal to Work.", "Pretend it completes and releases its allocated resources to Work.", "Processes still unfinished at the end are deadlocked."], "filename": "lab_2b_deadlock_detection.c", "code": "#include \u003cstdio.h\u003e\n\nint leq(int a[], int b[], int m) {\n    for (int i = 0; i \u003c m; i++) {\n        if (a[i] \u003e b[i]) {\n            return 0;\n        }\n    }\n    return 1;\n}\n\nint zeroAllocation(int row[], int m) {\n    for (int i = 0; i \u003c m; i++) {\n        if (row[i] != 0) {\n            return 0;\n        }\n    }\n    return 1;\n}\n\nvoid detect(const char *title, int n, int allocation[][2], int request[][2], int available[]) {\n    int work[2] = {available[0], available[1]};\n    int finish[4] = {0};\n\n    for (int i = 0; i \u003c n; i++) {\n        finish[i] = zeroAllocation(allocation[i], 2);\n    }\n\n    int progress = 1;\n    while (progress) {\n        progress = 0;\n        for (int i = 0; i \u003c n; i++) {\n            if (!finish[i] \u0026\u0026 leq(request[i], work, 2)) {\n                for (int j = 0; j \u003c 2; j++) {\n                    work[j] += allocation[i][j];\n                }\n                finish[i] = 1;\n                progress = 1;\n            }\n        }\n    }\n\n    printf(\"%s\\nAvailable: %d %d \\n\", title, available[0], available[1]);\n    printf(\"Deadlocked processes: \");\n    int deadlock = 0;\n    for (int i = 0; i \u003c n; i++) {\n        if (!finish[i]) {\n            printf(\"P%d \", i);\n            deadlock = 1;\n   <script>
    const REPORT_ITEMS = JSON.parse(document.getElementById("report-data").textContent);

    function esc(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function attr(value) {
      return esc(value).replace(/"/g, "&quot;");
    }

    function decodeCodeEntities(value) {
      let decoded = String(value || "");
      for (let i = 0; i < 2; i++) {
        const textarea = document.createElement("textarea");
        textarea.innerHTML = decoded;
        if (textarea.value === decoded) break;
        decoded = textarea.value;
      }
      return decoded;
    }

    function getValue(id, fallback) {
      const input = document.getElementById(id);
      const value = input ? input.value.trim() : "";
      return value || fallback;
    }

    function buildTokens(student) {
      return {
        "{NAME}": student.name,
        "{ROLL}": student.roll,
        "{SECTION}": student.section
      };
    }

    function fill(text, tokens) {
      let value = String(text || "");
      Object.keys(tokens).forEach((key) => {
        value = value.split(key).join(tokens[key]);
      });
      return value;
    }

    function makeBlock(html, extraClass) {
      const block = document.createElement("div");
      block.className = "content-block" + (extraClass ? " " + extraClass : "");
      block.innerHTML = html;
      return block;
    }

    function slug(text) {
      const clean = String(text || "student").toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_+|_+$/g, "");
      return clean || "student";
    }

    function executableName(filename) {
      const clean = String(filename || "program").replace(/\.[^/.\\]+$/, "");
      return `${clean || "program"}.exe`;
    }

    function currentStudent() {
      return {
        name: getValue("nameIn", "______________________________"),
        roll: getValue("rollIn", "______________"),
        section: getValue("sectionIn", "________")
      };
    }

    function currentTheme() {
      return document.getElementById("themeIn").checked ? "dark" : "light";
    }

    function createPage(container) {
      const page = document.createElement("section");
      page.className = "report-page";
      const inner = document.createElement("div");
      inner.className = "page-inner";
      inner.innerHTML = '<div class="page-content"></div>';
      page.appendChild(inner);
      container.appendChild(page);
      return inner.querySelector(".page-content");
    }

    function paginate(container, blocks) {
      let content = createPage(container);
      blocks.forEach((block) => {
        content.appendChild(block);
        if (content.scrollHeight > content.clientHeight + 2) {
          content.removeChild(block);
          content = createPage(container);
          content.appendChild(block);
        }
      });
    }

    function theoryHtml(item) {
      if (!item.theory || !item.theory.length) return "";
      return `
        <div class="section-title">Theory:</div>
        <div class="info-box">${item.theory.map((p) => `<p>${esc(p)}</p>`).join("")}</div>`;
    }

    function algorithmHtml(item) {
      if (!item.algorithm || !item.algorithm.length) return "";
      return `
        <div class="section-title">Algorithm / Steps:</div>
        <div class="algo-box"><ol>${item.algorithm.map((step) => `<li>${esc(step)}</li>`).join("")}</ol></div>`;
    }

    function codeLineHtml(line, index) {
      const decodedLine = decodeCodeEntities(line);
      const codeLine = decodedLine === "" ? "&nbsp;" : esc(decodedLine);
      return `${index === 0 ? '<div class="section-title">Source Code:</div>' : ''}<pre class="plain-code">${codeLine}</pre>`;
    }

    function terminalBlockHtml(item, outputText, theme) {
      const title = `C:\\${slug(getValue("nameIn", "student"))}\\os\\${executableName(item.filename)}`;
      return `
        <div class="section-title">Output:</div>
        <div class="win-terminal ${theme}">
          <div class="win-titlebar">
            <div class="win-title-text">${esc(title)}</div>
            <div class="win-btns">
              <div class="win-btn"><svg viewBox="0 0 10 1" fill="currentColor"><rect width="10" height="1"></rect></svg></div>
              <div class="win-btn"><svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1"><rect x="0.5" y="0.5" width="9" height="9"></rect></svg></div>
              <div class="win-btn"><svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.2"><line x1="1" y1="1" x2="9" y2="9"></line><line x1="9" y1="1" x2="1" y2="9"></line></svg></div>
            </div>
          </div>
          <pre class="t-body">${esc(outputText)}${outputText.trim() ? "\n\n" : ""}<span class="t-process">Process exited after 0.0234 seconds with return value 0</span>
<span class="t-press">Press any key to continue . . .</span></pre>
        </div>`;
    }

    function buildItemBlocks(item, tokens, theme) {
      const blocks = [];
      blocks.push(makeBlock(`<p class="question">${esc(item.question)}</p>`));

      const theory = theoryHtml(item);
      if (theory) blocks.push(makeBlock(theory));
      const algorithm = algorithmHtml(item);
      if (algorithm) blocks.push(makeBlock(algorithm, "algorithm-block"));

      if (item.code) {
        const filledCode = fill(item.code, tokens);
        filledCode.split("\n").forEach((line, index) => {
          blocks.push(makeBlock(codeLineHtml(line, index), index === 0 ? "source-code-first-block" : "code-line-block"));
        });
      }

      if (item.output && item.output.trim()) {
        const filledOutput = fill(item.output, tokens);
        blocks.push(makeBlock(terminalBlockHtml(item, filledOutput, theme), "output-block"));
      }

      return blocks;
    }

    function buildIndexBlocks() {
      return [makeBlock(`
        <h2 class="index-title">Contents Page</h2>
        <div class="index-subtitle">Subject: Operating System<br>List of Lab Works</div>
        <table class="index-table">
          <thead>
            <tr><th>Lab No.</th><th>Title</th><th>Date</th><th>Signature/Remarks</th></tr>
          </thead>
          <tbody>${REPORT_ITEMS.map((item) => `
            <tr>
              <td>${esc(item.no)}</td>
              <td>${esc(item.title)}</td>
              <td class="submitted-date-cell">2083/04/__</td>
              <td class="signature-cell"></td>
            </tr>`).join("")}</tbody>
        </table>`)];
    }

    function renderReport() {
      const student = currentStudent();
      const tokens = buildTokens(student);
      const theme = currentTheme();
      const container = document.getElementById("pages");
      container.innerHTML = "";

      paginate(container, buildIndexBlocks());
      REPORT_ITEMS.forEach((item) => {
        paginate(container, buildItemBlocks(item, tokens, theme));
      });
    }

    ["nameIn", "rollIn", "sectionIn", "themeIn"].forEach((id) => {
      document.getElementById(id).addEventListener("input", renderReport);
      document.getElementById(id).addEventListener("change", renderReport);
    });

    renderReport();
  </script>
</body>
</html>
