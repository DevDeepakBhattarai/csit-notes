<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CSC 266 AI Lab Report Generator</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <style>
    @page {
      size: A4;
      margin: 0;
    }

    * {
      box-sizing: border-box;
    }

    :root {
      --screen-bg: #101217;
      --panel: #181c24;
      --panel-2: #202633;
      --line: rgba(255, 255, 255, 0.12);
      --text: #eef2f6;
      --muted: #9aa6b5;
      --orange: #f47b20;
      --blue: #5294d0;
      --green: #2bb673;
      --paper: #ffffff;
      --ink: #121212;
      --paper-width: 210mm;
      --paper-height: 297mm;
      --paper-padding: 10mm;
      --page-border-padding: 5.5mm;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(244, 123, 32, 0.08), transparent 34%),
        linear-gradient(315deg, rgba(82, 148, 208, 0.10), transparent 36%),
        var(--screen-bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    .controls {
      max-width: 1120px;
      margin: 22px auto;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(24, 28, 36, 0.94);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
    }

    .controls-head {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: end;
      border-bottom: 1px solid var(--line);
      padding-bottom: 14px;
      margin-bottom: 14px;
    }

    .controls h1 {
      margin: 0;
      font-size: 23px;
      line-height: 1.2;
      color: #fff;
      letter-spacing: 0;
    }

    .controls p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .input-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(150px, 1fr));
      gap: 10px;
    }

    .field label {
      display: block;
      margin: 0 0 5px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .field input {
      width: 100%;
      padding: 10px 11px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: var(--panel-2);
      color: var(--text);
      outline: none;
      font-size: 13px;
    }

    .field input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(82, 148, 208, 0.16);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 14px;
    }

    .print-btn {
      border: 0;
      border-radius: 6px;
      background: var(--green);
      color: #fff;
      font-weight: 700;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 13px;
    }

    .print-btn:hover {
      filter: brightness(1.05);
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      color: var(--muted);
      font-size: 12px;
      user-select: none;
    }

    .theme-toggle input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .switch {
      width: 46px;
      height: 25px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: #343b49;
      position: relative;
      transition: background 0.2s ease;
    }

    .switch::after {
      content: "";
      position: absolute;
      width: 19px;
      height: 19px;
      top: 2px;
      left: 2px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.32);
      transition: transform 0.2s ease;
    }

    .theme-toggle input:checked + .switch {
      background: var(--blue);
    }

    .theme-toggle input:checked + .switch::after {
      transform: translateX(21px);
    }

    .pages {
      padding: 10px 0 36px;
      overflow-x: auto;
    }

    .report-page {
      width: var(--paper-width);
      height: var(--paper-height);
      margin: 24px auto;
      padding: var(--paper-padding);
      color: var(--ink);
      background: var(--paper);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.36);
      font-family: "Times New Roman", Times, serif;
      overflow: hidden;
    }

    .page-inner {
      height: 100%;
      border: 2px solid #202020;
      padding: var(--page-border-padding);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: #fff;
      min-height: 0;
    }

    .student-footer {
      display: flex;
      justify-content: space-between;
      gap: 10mm;
      border-top: 1px solid #111;
      padding-top: 2.4mm;
      margin-top: 3mm;
      font-size: 11.5pt;
      line-height: 1.25;
      color: #111;
    }

    .student-footer span {
      display: inline-block;
      min-width: 44mm;
      border-bottom: 1px solid #111;
      padding-left: 2mm;
    }

    .page-content {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .content-block {
      break-inside: avoid;
      page-break-inside: avoid;
      margin: 0 0 4.2mm;
    }

    .content-block:last-child {
      margin-bottom: 0;
    }

    .algorithm-block {
      margin-bottom: 1.8mm;
    }

    .question {
      margin: 0;
      font-size: 13pt;
      line-height: 1.38;
      font-weight: 700;
    }

    .section-title {
      font-size: 12pt;
      font-weight: 700;
      font-style: italic;
      margin: 0 0 1.7mm;
      color: #111;
    }

    .info-box,
    .algo-box {
      border: 1px solid #d3d6dc;
      border-radius: 5px;
      background: #f7f8fa;
      padding: 3mm;
      font-size: 12.5pt;
      line-height: 1.35;
    }

    .info-box p {
      margin: 0 0 2mm;
    }

    .info-box p:last-child {
      margin-bottom: 0;
    }

    .algo-box ol,
    .algo-box ul {
      margin: 0;
      padding-left: 5.2mm;
    }

    .algo-box li {
      margin: 0 0 1.3mm;
    }

    .diagram-box {
      border: 1px solid #d3d6dc;
      border-radius: 5px;
      background: #fff;
      padding: 2.6mm;
    }

    .diagram-caption {
      margin: 0 0 2mm;
      color: #374151;
      font-size: 9.2pt;
      font-weight: 700;
      text-align: center;
    }

    .mermaid-target {
      height: 57mm;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .mermaid-target.tall {
      height: 89mm;
    }

    .mermaid-target.short {
      height: 43mm;
    }

    .mermaid-target svg {
      width: 100% !important;
      max-width: 100% !important;
      height: 100% !important;
      max-height: 100% !important;
    }

    .diagram-loading {
      color: #777;
      font-family: Consolas, "Courier New", monospace;
      font-size: 8.7pt;
    }

    .plain-code {
      margin: 0;
      padding: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: normal;
      font-family: Consolas, "Courier New", monospace;
      font-size: 10pt;
      line-height: 1.26;
      color: #111;
      background: transparent;
      border: 0;
    }

    .source-code-first-block,
    .code-line-block {
      margin: 0;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .source-code-first-block .section-title {
      margin-bottom: 1.2mm;
    }

    .output-block {
      margin-top: 5mm;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .win-terminal {
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.24), 0 2px 8px rgba(0, 0, 0, 0.16);
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    .win-terminal.dark {
      background: #0c0c0c;
      color: #cccccc;
    }

    .win-terminal.dark .win-titlebar {
      background: #1f1f1f;
      border-bottom: 1px solid #333;
    }

    .win-terminal.dark .win-title-text,
    .win-terminal.dark .win-btn {
      color: #999;
    }

    .win-terminal.dark .t-process {
      color: #e5c07b;
    }

    .win-terminal.dark .t-press {
      color: #666;
    }

    .win-terminal.light {
      background: #fff;
      color: #1e1e1e;
      border: 1px solid #d4d4d4;
      box-shadow: none;
    }

    .win-terminal.light .win-titlebar {
      background: #f3f3f3;
      border-bottom: 1px solid #e0e0e0;
    }

    .win-terminal.light .win-title-text,
    .win-terminal.light .win-btn {
      color: #666;
    }

    .win-terminal.light .t-process {
      color: #9a6a00;
    }

    .win-terminal.light .t-press {
      color: #7a7a7a;
    }

    .win-titlebar {
      display: flex;
      align-items: center;
      height: 30px;
      user-select: none;
    }

    .win-title-text {
      flex: 1;
      font-size: 11px;
      padding-left: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .win-btns {
      display: flex;
      height: 100%;
    }

    .win-btn {
      width: 38px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
    }

    .win-btn svg {
      width: 10px;
      height: 10px;
    }

    .t-body {
      margin: 0;
      padding: 3mm 3.6mm;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-family: Consolas, "Courier New", monospace;
      font-size: 9.4pt;
      line-height: 1.34;
    }

    .index-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12pt;
      line-height: 1.25;
    }

    .index-title {
      margin: 0 0 3.5mm;
      text-align: center;
      font-size: 17pt;
      line-height: 1.2;
      font-weight: 700;
    }

    .index-table th,
    .index-table td {
      border: 1px solid #cfd4dc;
      padding: 1.2mm 2.2mm;
      vertical-align: middle;
    }

    .index-table th {
      background: #f0f3f7;
      text-align: left;
    }

    .index-table th:first-child,
    .index-table td:first-child {
      width: 24mm;
      text-align: center;
    }

    .index-table th:last-child,
    .index-table td:last-child {
      width: 36mm;
      text-align: center;
    }

    .submitted-date-cell {
      width: 34mm;
      text-align: center;
    }

    .signature-cell {
      height: 6mm;
    }

    @media (max-width: 900px) {
      .controls {
        margin: 12px;
      }

      .controls-head {
        display: block;
      }

      .input-grid {
        grid-template-columns: 1fr;
      }

      .report-page {
        width: var(--paper-width);
        height: var(--paper-height);
        min-height: 0;
        margin: 12px 0;
      }
    }

    @media print {
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      body {
        margin: 0;
        padding: 0;
        background: #fff;
      }

      .no-print {
        display: none !important;
      }

      .pages {
        padding: 0;
      }

      .report-page {
        width: var(--paper-width);
        height: var(--paper-height);
        margin: 0;
        box-shadow: none;
        overflow: hidden;
        page-break-after: always;
        break-after: page;
      }

      .report-page:last-child {
        page-break-after: auto;
      }
    }
  </style>
</head>
<body>
  <section class="controls no-print">
    <div class="controls-head">
      <div>
        <h1>CSC 266: Artificial Intelligence Lab Report</h1>
        <p>Enter student details, choose output theme, then print or save as PDF. Mermaid diagrams are rendered inside the report pages.</p>
      </div>
      <button class="print-btn" type="button" onclick="window.print()">Print / Save as PDF</button>
    </div>
    <div class="input-grid">
      <div class="field">
        <label for="nameIn">Student Name</label>
        <input id="nameIn" type="text" placeholder="Your full name">
      </div>
      <div class="field">
        <label for="rollIn">Roll No.</label>
        <input id="rollIn" type="text" placeholder="Roll number">
      </div>
      <div class="field">
        <label for="sectionIn">Section</label>
        <input id="sectionIn" type="text" placeholder="Section">
      </div>
    </div>
    <div class="actions">
      <label class="theme-toggle">
        <input id="themeIn" type="checkbox" checked>
        <span class="switch"></span>
        <span>Dark output theme</span>
      </label>
    </div>
  </section>

  <main id="pages" class="pages"></main>

  <script>
    const REPORT_ITEMS = [
      {
        no: "I.1",
        lab: "Lab I",
        language: "C",
        title: "BFS Algorithm",
        question: "WAP to implement BFS algorithm. The graph should also be drawn in the lab report.",
        theory: [
          "Breadth First Search explores the graph level by level. It uses a queue, marks each visited vertex, and is suitable for finding the shortest path in an unweighted graph.",
          "The sample graph starts at A and searches for G. The BFS path is A -> B -> E -> G."
        ],
        algorithm: [
          "Insert the start vertex into a queue and mark it visited.",
          "Remove the front vertex, visit it, and enqueue all unvisited adjacent vertices.",
          "Store parent links when a vertex is discovered so the final path can be reconstructed.",
          "Stop when the goal is found or when the queue becomes empty."
        ],
        diagram: {
          title: "Graph used for BFS",
          code: `flowchart LR
  A((A)) --> B((B))
  A --> C((C))
  B --> D((D))
  B --> E((E))
  C --> F((F))
  E --> G((G))
  F --> G
  classDef start fill:#d8f3dc,stroke:#2d6a4f,stroke-width:2px;
  classDef goal fill:#ffe8cc,stroke:#e8590c,stroke-width:2px;
  class A start;
  class G goal;`
        },
        filename: "lab_i_bfs.c",
        code: String.raw`#include <stdio.h>
#include <stdbool.h>

int main() {
    char vertices[] = {'A', 'B', 'C', 'D', 'E', 'F', 'G'};
    int graph[7][7] = {0};
    graph[0][1] = graph[0][2] = 1;
    graph[1][3] = graph[1][4] = 1;
    graph[2][5] = 1;
    graph[4][6] = graph[5][6] = 1;

    int start = 0, goal = 6;
    int queue[20], front = 0, rear = 0;
    int parent[7], order[7], orderCount = 0;
    bool visited[7] = {false};

    for (int i = 0; i < 7; i++) {
        parent[i] = -1;
    }
    queue[rear++] = start;
    visited[start] = true;
    parent[start] = start;

    while (front < rear) {
        int current = queue[front++];
        order[orderCount++] = current;
        if (current == goal) {
            break;
        }

        for (int next = 0; next < 7; next++) {
            if (graph[current][next] && !visited[next]) {
                visited[next] = true;
                parent[next] = current;
                queue[rear++] = next;
            }
        }
    }

    int path[7], count = 0;
    for (int v = goal; ; v = parent[v]) {
        path[count++] = v;
        if (v == start) {
            break;
        }
    }

    printf("BFS Traversal: ");
    for (int i = 0; i < orderCount; i++) {
        printf("%s%c", i ? " " : "", vertices[order[i]]);
    }
    printf("\nPath: ");
    for (int i = count - 1; i >= 0; i--) {
        printf("%s%c", i == count - 1 ? "" : " ", vertices[path[i]]);
    }
    printf("\n\nName: {NAME}\nRoll No: {ROLL}\nLab Number: Lab I - BFS\n");
    return 0;
}`,
        output: String.raw`BFS Traversal: A B C D E F G
Path: A B E G

Name: {NAME}
Roll No: {ROLL}
Lab Number: Lab I - BFS`
      },
      {
        no: "I.2",
        lab: "Lab I",
        language: "C",
        title: "DFS Algorithm",
        question: "WAP to implement DFS algorithm. The graph should also be drawn in the lab report.",
        theory: [
          "Depth First Search explores a branch completely before backtracking. It can be implemented recursively or by using a stack.",
          "For the same graph, DFS visits deeper nodes from A before trying the next sibling."
        ],
        algorithm: [
          "Start from the source vertex and mark it visited.",
          "Visit the first unvisited adjacent vertex recursively.",
          "Backtrack when a vertex has no unvisited adjacent vertex.",
          "Use the recursion path to report whether the goal is found."
        ],
        diagram: {
          title: "Graph used for DFS",
          code: `flowchart LR
  A((A)) --> B((B))
  A --> C((C))
  B --> D((D))
  B --> E((E))
  C --> F((F))
  E --> G((G))
  F --> G
  classDef start fill:#d8f3dc,stroke:#2d6a4f,stroke-width:2px;
  classDef goal fill:#ffe8cc,stroke:#e8590c,stroke-width:2px;
  class A start;
  class G goal;`
        },
        filename: "lab_i_dfs.c",
        code: String.raw`#include <stdio.h>
#include <stdbool.h>

int graph[7][7];
bool visited[7];
int order[7], orderCount = 0;
int path[7], pathCount = 0;

bool dfs(int node, int goal) {
    visited[node] = true;
    order[orderCount++] = node;
    path[pathCount++] = node;
    if (node == goal) {
        return true;
    }

    for (int next = 0; next < 7; next++) {
        if (graph[node][next] && !visited[next]) {
            if (dfs(next, goal)) {
                return true;
            }
        }
    }

    pathCount--;
    return false;
}

int main() {
    char vertices[] = {'A', 'B', 'C', 'D', 'E', 'F', 'G'};
    graph[0][1] = graph[0][2] = 1;
    graph[1][3] = graph[1][4] = 1;
    graph[2][5] = 1;
    graph[4][6] = graph[5][6] = 1;

    bool found = dfs(0, 6);

    printf("DFS Traversal: ");
    for (int i = 0; i < orderCount; i++) {
        printf("%s%c", i ? " " : "", vertices[order[i]]);
    }
    printf("\nGoal Found: %s\nPath: ", found ? "Yes" : "No");
    for (int i = 0; i < pathCount; i++) {
        printf("%s%c", i ? " " : "", vertices[path[i]]);
    }
    printf("\n\nName: {NAME}\nRoll No: {ROLL}\nLab Number: Lab I - DFS\n");
    return 0;
}`,
        output: String.raw`DFS Traversal: A B D E G
Goal Found: Yes
Path: A B E G

Name: {NAME}
Roll No: {ROLL}
Lab Number: Lab I - DFS`
      },
      {
        no: "I.3",
        lab: "Lab I",
        language: "C",
        title: "UCS Algorithm",
        question: "WAP to implement UCS algorithm. The graph should also be drawn in the lab report.",
        theory: [
          "Uniform Cost Search expands the node with the lowest cumulative path cost. A priority queue is used to always choose the cheapest frontier node.",
          "It guarantees the least-cost path when all edge costs are non-negative."
        ],
        algorithm: [
          "Push the start node into a priority queue with cost 0.",
          "Pop the node with minimum cost and ignore it if a better cost was already processed.",
          "Relax each outgoing edge and update parent links when a lower cost is found.",
          "Stop when the goal node is removed from the priority queue."
        ],
        diagram: {
          title: "Weighted graph used for UCS",
          code: `flowchart LR
  A((A)) -->|2| B((B))
  A -->|5| C((C))
  B -->|4| D((D))
  B -->|3| E((E))
  C -->|2| F((F))
  D -->|2| G((G))
  E -->|1| G
  F -->|5| G
  classDef start fill:#d8f3dc,stroke:#2d6a4f,stroke-width:2px;
  classDef goal fill:#ffe8cc,stroke:#e8590c,stroke-width:2px;
  class A start;
  class G goal;`
        },
        filename: "lab_i_ucs.c",
        code: String.raw`#include <stdio.h>
#include <stdbool.h>

int main() {
    char vertices[] = {'A', 'B', 'C', 'D', 'E', 'F', 'G'};
    int cost[7][7] = {0};
    cost[0][1] = 2; cost[0][2] = 5;
    cost[1][3] = 4; cost[1][4] = 3;
    cost[2][5] = 2; cost[3][6] = 2;
    cost[4][6] = 1; cost[5][6] = 5;

    int dist[7], parent[7], order[7], orderCount = 0;
    bool done[7] = {false};
    for (int i = 0; i < 7; i++) {
        dist[i] = 1000000;
        parent[i] = -1;
    }
    dist[0] = 0;
    parent[0] = 0;

    for (int step = 0; step < 7; step++) {
        int node = -1;
        for (int i = 0; i < 7; i++) {
            if (!done[i] && (node == -1 || dist[i] < dist[node])) {
                node = i;
            }
        }
        if (node == -1 || dist[node] == 1000000) {
            break;
        }
        done[node] = true;
        order[orderCount++] = node;
        if (node == 6) {
            break;
        }

        for (int next = 0; next < 7; next++) {
            if (cost[node][next] && dist[node] + cost[node][next] < dist[next]) {
                dist[next] = dist[node] + cost[node][next];
                parent[next] = node;
            }
        }
    }

    int path[7], count = 0;
    for (int v = 6; ; v = parent[v]) {
        path[count++] = v;
        if (v == 0) {
            break;
        }
    }

    printf("UCS Expansion Order: ");
    for (int i = 0; i < orderCount; i++) {
        printf("%s%c", i ? " " : "", vertices[order[i]]);
    }
    printf("\nMinimum Cost: %d\nPath: ", dist[6]);
    for (int i = count - 1; i >= 0; i--) {
        printf("%s%c", i == count - 1 ? "" : " ", vertices[path[i]]);
    }
    printf("\n\nName: {NAME}\nRoll No: {ROLL}\nLab Number: Lab I - UCS\n");
    return 0;
}`,
        output: String.raw`UCS Expansion Order: A B C E D G
Minimum Cost: 6
Path: A B E G

Name: {NAME}
Roll No: {ROLL}
Lab Number: Lab I - UCS`

#include <stdbool.h>

int graph[7][7];
int order[20], orderCount = 0;
int path[20], pathCount = 0;

bool dls(int node, int goal, int limit) {
    order[orderCount++] = node;
    path[pathCount++] = node;
    if (node == goal) {
        return true;
    }
    if (limit == 0) {
        pathCount--;
        return false;
    }

    for (int next = 0; next < 7; next++) {
        if (graph[node][next] && dls(next, goal, limit - 1)) {
            return true;
        }
    }

    pathCount--;
    return false;
}

    char vertices[] = {'A', 'B', 'C', 'D', 'E', 'F', 'G'};
    int cost[7][7] = {0};
    int h[] = {6, 4, 5, 2, 1, 3, 0};
    cost[0][1] = 2; cost[0][2] = 5;
    cost[1][3] = 4; cost[1][4] = 3;
    cost[2][5] = 2; cost[3][6] = 2;
    cost[4][6] = 1; cost[5][6] = 5;

    int g[7], parent[7], order[7], orderCount = 0;
    bool closed[7] = {false};
    for (int i = 0; i < 7; i++) {
        g[i] = 1000000;
        parent[i] = -1;
    }
    g[0] = 0;
    parent[0] = 0;

    for (int step = 0; step < 7; step++) {
        int node = -1;
        for (int i = 0; i < 7; i++) {
            if (!closed[i] && g[i] < 1000000 &&
            (node == -1 || g[i] + h[i] < g[node] + h[node])) node = i;
        }
        if (node == -1) {
            break;
        }
        closed[node] = true;
        order[orderCount++] = node;
        if (node == 6) {
            break;
        }

        for (int next = 0; next < 7; next++) {
            if (cost[node][next] && g[node] + cost[node][next] < g[next]) {
                g[next] = g[node] + cost[node][next];
                parent[next] = node;
            }
        }

        path[count++] = v;
        if (v == 0) {

        code: String.raw`#include <stdio.h>

int max(int a, int b) { return a > b ? a : b; }
int min(int a, int b) { return a < b ? a : b; }

int minimax(int values[], int depth, int index, int isMax, int alpha, int beta) {
    if (depth == 3) {
        return values[index];
    }

    if (isMax) {
        int best = -1000;
        for (int i = 0; i < 2; i++) {
            int value = minimax(values, depth + 1, index * 2 + i, 0, alpha, beta);
            best = max(best, value);
            alpha = max(alpha, best);
            if (beta <= alpha) {
                break;
            }
        }
        return best;
    }

    int best = 1000;
    for (int i = 0; i < 2; i++) {
        int value = minimax(values, depth + 1, index * 2 + i, 1, alpha, beta);
        best = min(best, value);
        beta = min(beta, best);
        if (beta <= alpha) {
            break;
        }
    }
    return best;
}

int main() {
    int leafValues[] = {3, 5, 6, 9, 1, 2, 0, -1};
    int result = minimax(leafValues, 0, 0, 1, -1000, 1000);

    printf("Leaf Values: ");
    for (int i = 0; i < 8; i++) {
        printf("%s%d", i ? " " : "", leafValues[i]);
    }
    printf("\nOptimal Value for MAX: %d\n", result);
    printf("\nName: {NAME}\nRoll No: {ROLL}\nLab Number: Lab I - Minimax Alpha Beta\n");
    return 0;
}`,

def solve():

    queue = deque([(start, [])])

BITS = 5
POP_SIZE = 6
GENERATIONS = 5

def decode(chromosome):
    return int(chromosome, 2)

def fitness(chromosome):
    x = decode(chromosome)
    return x * x

def random_chromosome():
    return "".join(random.choice("01") for _ in range(BITS))

def select(population):
    population = sorted(population, key=fitness, reverse=True)
    return population[0], population[1]

def crossover(a, b):
    point = random.randint(1, BITS - 1)
    return a[:point] + b[point:], b[:point] + a[point:]

def mutate(chromosome, rate=0.1):
    genes = list(chromosome)
    for i in range(len(genes)):
        if random.random() < rate:
            genes[i] = "1" if genes[i] == "0" else "0"
    return "".join(genes)

population = [random_chromosome() for _ in range(POP_SIZE)]

for gen in range(1, GENERATIONS + 1):
    p1, p2 = select(population)
    children = []
    while len(children) < POP_SIZE:
        c1, c2 = crossover(p1, p2)
        children.extend([mutate(c1), mutate(c2)])
    population = children[:POP_SIZE]
    best = max(population, key=fitness)
    print("Generation", gen, "Best:", best, "x=", decode(best), "fitness=", fitness(best))

    function terminalBlockHtml(item, outputText, theme) {
      const title = `C:\\${slug(getValue("nameIn", "student"))}\\ai\\${executableName(item.filename)}`;
      const time = getExecutionTime(item.filename || item.no || "ai");
      return `
        <div class="section-title">Output:</div>
        <div class="win-terminal ${theme}">
          <div class="win-titlebar">
            <div class="win-title-text">${esc(title)}</div>
            <div class="win-btns">
              <div class="win-btn"><svg viewBox="0 0 10 1" fill="currentColor"><rect width="10" height="1"></rect></svg></div>
              <div class="win-btn"><svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1"><rect x="0.5" y="0.5" width="9" height="9"></rect></svg></div>
              <div class="win-btn"><svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.2"><line x1="1" y1="1" x2="9" y2="9"></line><line x1="9" y1="1" x2="1" y2="9"></line></svg></div>
            </div>
          </div>
          <pre class="t-body">${esc(outputText)}${outputText.trim() ? "\n\n" : ""}<span class="t-process">Process exited after ${time} seconds with return value 0</span>
<span class="t-press">Press any key to continue . . .</span></pre>
        </div>`;
    }

    function buildItemBlocks(item, tokens, theme) {
      const blocks = [];
      blocks.push(makeBlock(`<p class="question">${esc(item.question)}</p>`));

      if (item.diagram && shouldRenderDiagram(item)) blocks.push(makeBlock(diagramHtml(item.diagram)));
      const theory = theoryHtml(item);
      if (theory) blocks.push(makeBlock(theory));
      const algorithm = algorithmHtml(item);
      if (algorithm) blocks.push(makeBlock(algorithm, "algorithm-block"));

      if (item.code) {
        const filledCode = fill(item.code, tokens);
        filledCode.split("\n").forEach((line, index) => {
          blocks.push(makeBlock(codeLineHtml(line, index), index === 0 ? "source-code-first-block" : "code-line-block"));
        });
      }

      if (item.output && item.output.trim()) {
        const filledOutput = fill(item.output, tokens);
        blocks.push(makeBlock(terminalBlockHtml(item, filledOutput, theme), "output-block"));
      }

      return blocks;
    }

    function buildIndexBlocks() {
      const blocks = [makeBlock(`
        <h2 class="index-title">Index</h2>
        <table class="index-table">
          <thead>
            <tr><th>Lab No.</th><th>Experiment / Question</th><th>Submitted Date</th><th>Signature</th></tr>
          </thead>
          <tbody>${REPORT_ITEMS.map((item) => `
            <tr>
              <td>${esc(item.no)}</td>
              <td>${esc(item.title)}</td>
              <td class="submitted-date-cell">2083/04/__</td>
              <td class="signature-cell"></td>
            </tr>`).join("")}</tbody>
        </table>`)];

      return blocks; 
    }

    async function renderMermaidDiagrams(cycle) {
      if (!window.mermaid) return;
      mermaid.initialize({
        startOnLoad: false,
        securityLevel: "loose",
        theme: "base",
        flowchart: { htmlLabels: true, curve: "basis", useMaxWidth: true },
        themeVariables: {
          fontFamily: "Times New Roman",
          primaryColor: "#ffffff",
          primaryTextColor: "#111111",
          primaryBorderColor: "#555555",
          lineColor: "#333333",
          secondaryColor: "#f7f8fa",
          tertiaryColor: "#fff7ed"
        }
      });

      const targets = Array.from(document.querySelectorAll(".mermaid-target"));
      for (let i = 0; i < targets.length; i++) {
        if (cycle !== renderCycle) return;
        const target = targets[i];
        const code = decodeURIComponent(target.dataset.code || "");
        try {
          const result = await mermaid.render(`ai_lab_mermaid_${cycle}_${i}`, code);
          target.innerHTML = result.svg;
        } catch (error) {
          target.innerHTML = `<pre class="diagram-loading">${esc(code)}</pre>`;
        }
      }
    }

    function renderReport() {
      renderCycle++;
      const cycle = renderCycle;
      const student = currentStudent();
      const tokens = buildTokens(student);
      const theme = currentTheme();
      const container = document.getElementById("pages");
      container.innerHTML = "";

      paginate(container, student, { no: "Index", title: "Index Page", showFooter: false }, buildIndexBlocks());
      REPORT_ITEMS.forEach((item) => {
        paginate(container, student, item, buildItemBlocks(item, tokens, theme));
      });

      renderMermaidDiagrams(cycle);
    }

    ["nameIn", "rollIn", "sectionIn", "themeIn"].forEach((id) => {
      document.getElementById(id).addEventListener("input", renderReport);
      document.getElementById(id).addEventListener("change", renderReport);
    });

    renderReport();
  </script>
</body>
</html>
