<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DBMS Lab Report Generator</title>
  <meta name="description" content="Database Management System lab report with SQL scripts and XAMPP/phpMyAdmin-style outputs.">
  <style>
    :root {
      --bg-deep: #080a0e;
      --bg-surface: #10141b;
      --bg-elevated: #151b24;
      --bg-card: #19212c;
      --border-subtle: rgba(255,255,255,0.06);
      --border-medium: rgba(255,255,255,0.11);
      --accent: #3b82f6;
      --accent-cyan: #22d3ee;
      --accent-orange: #f97316;
      --accent-green: #22c55e;
      --accent-red: #ef4444;
      --text-primary: #eef2f7;
      --text-secondary: #a7b0c2;
      --text-muted: #697386;
      --paper: #f8fafc;
      --ink: #1e293b;
      --pm-blue: #273c75;
      --pm-border: #cfd7e2;
      --pm-orange: #f59e0b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      background:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px),
        var(--bg-deep);
      background-size: 32px 32px;
      color: var(--text-primary);
      font-family: "Segoe UI", Candara, Calibri, sans-serif;
      overflow-x: hidden;
    }

    ::selection { background: rgba(59,130,246,0.35); }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(59,130,246,0.35); border-radius: 99px; }

    .accent-line {
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent-cyan), transparent);
      opacity: 0.55;
    }

    .container {
      width: min(1420px, calc(100vw - 36px));
      margin: 0 auto;
      padding: 30px 0 42px;
    }

    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-medium);
      animation: enter 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .header h1 {
      font-size: clamp(2rem, 4vw, 3.1rem);
      line-height: 1;
      font-weight: 760;
      letter-spacing: 0;
      color: #fff;
    }

    .header h1 span {
      color: var(--accent-cyan);
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 9px;
      color: var(--text-muted);
      font: 700 11px/1.2 Consolas, "Cascadia Code", monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 8px;
    }

    .header-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent-green);
      box-shadow: 0 0 12px rgba(34,197,94,0.6);
    }

    .header-count {
      color: var(--text-secondary);
      font: 700 1rem/1.2 Consolas, "Cascadia Code", monospace;
      white-space: nowrap;
    }

    .inputs-section {
      margin: 18px 0 20px;
      animation: enter 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.08s both;
    }

    .inputs-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(170px, 1fr));
      gap: 12px;
    }

    .field-label {
      display: block;
      margin-bottom: 5px;
      color: var(--text-muted);
      font: 750 10px/1 Consolas, "Cascadia Code", monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .field-input {
      width: 100%;
      background: var(--bg-elevated);
      border: 1px solid var(--border-medium);
      border-radius: 8px;
      color: var(--text-primary);
      outline: none;
      padding: 10px 12px;
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    .tabs-wrap {
      animation: enter 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.12s both;
    }

    .tab-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      border-bottom: 1px solid var(--border-subtle);
      min-height: 46px;
    }

    .tab-btn,
    .tool-btn,
    .link-btn {
      appearance: none;
      border: 0;
      background: none;
      color: var(--text-muted);
      cursor: pointer;
      font: 700 13px/1 "Segoe UI", Candara, Calibri, sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 34px;
      padding: 0 13px;
      border-radius: 7px;
      transition: background 0.18s, color 0.18s, border-color 0.18s;
      text-decoration: none;
    }

    .tab-btn {
      border-radius: 0;
      min-height: 46px;
      position: relative;
    }

    .tab-btn::after {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: -1px;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: center;
      transition: transform 0.2s;
    }

    .tab-btn.active {
      color: var(--text-primary);
    }

    .tab-btn.active::after { transform: scaleX(1); }
    .tab-btn:hover,
    .tool-btn:hover,
    .link-btn:hover {
      color: var(--text-primary);
      background: rgba(255,255,255,0.05);
    }

    .tool-btn,
    .link-btn {
      border: 1px solid var(--border-medium);
      background: rgba(255,255,255,0.03);
    }

    .tool-btn.primary {
      background: var(--accent);
      color: #fff;
      border-color: rgba(255,255,255,0.1);
    }

    .tool-btn svg,
    .link-btn svg {
      width: 15px;
      height: 15px;
      flex: 0 0 auto;
    }

    .toolbar {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      padding: 5px 0 5px 10px;
    }

    .content-area {
      max-height: 78vh;
      overflow: auto;
      padding-top: 16px;
    }

    .cards-list,
    .outputs-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-bottom: 10px;
    }

    .lab-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid var(--border-subtle);
    }

    .card-num {
      width: 50px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: rgba(59,130,246,0.1);
      color: var(--accent-cyan);
      font: 800 16px/1 Consolas, "Cascadia Code", monospace;
      border: 1px solid rgba(34,211,238,0.18);
      flex: 0 0 auto;
    }

    .card-title h2 {
      color: #fff;
      font-size: 16px;
      line-height: 1.25;
      font-weight: 750;
      letter-spacing: 0;
    }

    .card-title p {
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.45;
      margin-top: 4px;
    }

    .card-arrow {
      margin-left: auto;
      width: 16px;
      height: 16px;
      color: var(--text-muted);
      transition: transform 0.25s;
      flex: 0 0 auto;
    }

    .card-arrow.open { transform: rotate(180deg); }
    .card-body { max-height: 0; overflow: hidden; transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1); }
    .card-body.open { max-height: 9000px; }

    .card-body-inner {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .code-wrap {
      overflow: hidden;
      border-radius: 8px;
      border: 1px solid var(--border-subtle);
      background: #0e1117;
    }

    .code-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: #171c25;
      border-bottom: 1px solid var(--border-subtle);
      padding: 9px 12px;
    }

    .code-filename {
      color: var(--text-muted);
      font: 700 11px/1 Consolas, "Cascadia Code", monospace;
    }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 0;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font: 700 11px/1 Consolas, "Cascadia Code", monospace;
      padding: 4px 7px;
      border-radius: 5px;
    }

    .copy-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.06); }
    .copy-btn svg { width: 13px; height: 13px; }

    pre {
      overflow: auto;
      padding: 16px;
      color: #d7dee9;
      font: 12.5px/1.62 Consolas, "Cascadia Code", monospace;
      tab-size: 2;
      white-space: pre;
    }

    .sql-key { color: #7dd3fc; font-weight: 700; }
    .sql-com { color: #78879a; }
    .sql-str { color: #fbbf24; }
    .sql-num { color: #a7f3d0; }

    .output-row {
      display: block;
    }

    .xampp-window {
      border: 1px solid #b7c9d7;
      border-radius: 4px;
      overflow: hidden;
      background: #fff;
      color: var(--ink);
      box-shadow: 0 10px 24px rgba(0,0,0,0.16);
    }

    .pm-body {
      padding: 0;
      background: #fff;
    }

    .query-strip {
      background: #e6e6e6;
      border: 0;
      border-radius: 0;
      padding: 18px 18px;
      color: #1f2937;
      font: 14px/1.5 "Segoe UI", Candara, Calibri, sans-serif;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .query-keyword {
      color: #8a008a;
      text-decoration: underline dotted;
      font-weight: 700;
    }

    .notice {
      border: 0;
      border-radius: 0;
      padding: 13px 14px;
      font-size: 14px;
      line-height: 1.45;
    }

    .notice.success {
      background: #efffaf;
      color: #111827;
    }

    .notice.error {
      background: #ffd7d7;
      color: #9b111e;
    }

    .notice.info {
      background: #e7f0f8;
      color: #1d4ed8;
    }

    .profiling-row {
      display: flex;
      align-items: center;
      gap: 7px;
      background: #d4e0ea;
      color: #111827;
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.35;
      flex-wrap: wrap;
    }

    .fake-checkbox {
      width: 13px;
      height: 13px;
      border: 1px solid #9aa7b3;
      background: #fff;
      border-radius: 2px;
      display: inline-block;
      flex: 0 0 auto;
    }

    .pm-link {
      color: #2b7db7;
      text-decoration: none;
    }

    .extra-options {
      display: inline-block;
      margin: 8px 0 12px;
      border: 1px solid #b8b8b8;
      border-radius: 4px;
      background: linear-gradient(#fff, #ddd);
      color: #111;
      padding: 4px 9px;
      font: 13px/1.2 "Segoe UI", Candara, Calibri, sans-serif;
      box-shadow: 0 1px 2px rgba(0,0,0,0.18);
    }

    .pm-result-area {
      padding: 0 0 18px;
    }

    .pm-table-wrap {
      overflow: auto;
      border: 0;
      border-radius: 0;
      margin-top: 0;
    }

    table.pm-table {
      width: auto;
      border-collapse: collapse;
      background: #fff;
      font-size: 14px;
      min-width: 0;
    }

    .pm-table th {
      background: linear-gradient(#f7f7f7, #dddddd);
      color: #1f2933;
      border: 0;
      padding: 4px 8px;
      text-align: left;
      font-weight: 650;
      white-space: nowrap;
    }

    .pm-table td {
      border: 0;
      padding: 4px 8px;
      color: #2f3a45;
      vertical-align: top;
      white-space: nowrap;
    }

    .pm-table tr:nth-child(even) td { background: #ddd; }
    .null { color: #8b5cf6; font-style: italic; font-family: Consolas, "Cascadia Code", monospace; }
    .empty-set { color: #64748b; font-style: italic; padding: 11px; font-size: 12px; }
    .split-tables { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .table-caption { color: #475569; font-size: 12px; font-weight: 800; margin: 4px 0 6px; }

    .footer {
      margin-top: 24px;
      padding-top: 14px;
      border-top: 1px solid var(--border-subtle);
      color: var(--text-muted);
      text-align: center;
      font: 700 10px/1.4 Consolas, "Cascadia Code", monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    @keyframes enter {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 780px) {
      .container { width: min(100vw - 24px, 1420px); padding-top: 22px; }
      .header { align-items: flex-start; flex-direction: column; }
      .inputs-grid { grid-template-columns: 1fr; }
      .toolbar { width: 100%; margin-left: 0; justify-content: flex-start; padding-left: 0; }
      .tab-bar { flex-wrap: wrap; }
      .content-area { max-height: none; overflow: visible; }
      .split-tables { grid-template-columns: 1fr; }
      .pm-db { display: none; }
    }

    @media print {
      body {
        background: #fff;
        color: #111827;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .no-print { display: none !important; }
      .container { width: auto; padding: 0; }
      .content-area { max-height: none; overflow: visible; }
      .header,
      .inputs-section,
      .footer { color: #111827; }
      .lab-card {
        border-color: #d1d5db;
        background: #fff;
        color: #111827;
        break-inside: avoid;
      }
      .card-header,
      .card-body-inner,
      .card-body { max-height: none !important; overflow: visible !important; }
      .card-arrow,
      .copy-btn { display: none !important; }
      pre { white-space: pre-wrap; color: #111827; background: #fff; }
      .output-row { break-inside: avoid; margin-bottom: 8px; }
      .xampp-window { box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="accent-line no-print"></div>

  <main class="container">
    <header class="header">
      <div>
        <h1>DBMS <span>Lab Report</span></h1>
        <div class="header-meta"><span class="header-dot"></span> CSC260 Database Management System</div>
      </div>
      <div class="header-count">Labs Split · SQL + Output</div>
    </header>

    <section class="inputs-section no-print">
      <div class="inputs-grid">
        <label>
          <span class="field-label">Name</span>
          <input id="studentName" class="field-input" type="text" placeholder="Your full name" oninput="render()">
        </label>
        <label>
          <span class="field-label">Roll / Section</span>
          <input id="studentRoll" class="field-input" type="text" placeholder="e.g. 45 / A" oninput="render()">
        </label>
        <label>
          <span class="field-label">College</span>
          <input id="studentCollege" class="field-input" type="text" placeholder="College name" oninput="render()">
        </label>
      </div>
    </section>

    <section class="tabs-wrap">
      <div class="tab-bar no-print">
        <button id="tabReport" class="tab-btn active" type="button" onclick="switchTab('report')">Questions + SQL</button>
        <button id="tabOutput" class="tab-btn" type="button" onclick="switchTab('output')">XAMPP Output</button>

        <div class="toolbar">
          <button class="tool-btn" type="button" onclick="expandAll()" title="Expand all lab sections">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></svg>
            Expand
          </button>
          <button class="tool-btn" type="button" onclick="downloadHtml()" title="Download the current HTML report">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
            HTML
          </button>
          <a class="link-btn" href="DBMS_Lab_Report_Package.zip" download title="Download the packaged report files">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M3.3 7 12 12l8.7-5"/><path d="M12 22V12"/></svg>
            Package
          </a>
          <button class="tool-btn primary" type="button" onclick="generateOutputPDF()" title="Print only the output panes as a PDF">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/></svg>
            Output PDF
          </button>
        </div>
      </div>

      <div id="contentArea" class="content-area"></div>
    </section>

    <footer class="footer no-print">Source decks: DBMS Lab 1.pptx and DBMS Lab 3.pptx · Output style: XAMPP / phpMyAdmin</footer>
  </main>

  <script>
    const REPORT_ITEMS = [
      {
        id: "1.1",
        labNo: "1",
        title: "List Existing Databases",
        question: "List all existing databases.",
        filename: "dbms_lab_1_1_show_databases.sql",
        sql: () => "SHOW DATABASES;"
      },
      {
        id: "1.2",
        labNo: "1",
        title: "Create and Verify Database",
        question: "Create a database named <your-name>dbms1 and verify that it is created.",
        filename: "dbms_lab_1_2_create_database.sql",
        sql: c => `CREATE DATABASE IF NOT EXISTS ${c.db1};
SHOW DATABASES;`
      },
      {
        id: "1.3",
        labNo: "1",
        title: "Select Current Database",
        question: "Select the created database to perform further SQL queries.",
        filename: "dbms_lab_1_3_use_database.sql",
        sql: c => `USE ${c.db1};`
      },
      {
        id: "1.4",
        labNo: "1",
        title: "Create Student and Teacher Tables",
        question: "Create student(sid, name, gender, program) and teacher(id, name, address) tables.",
        filename: "dbms_lab_1_4_create_tables.sql",
        sql: () => `CREATE TABLE student (
  sid INT,
  name VARCHAR(200),
  gender VARCHAR(200),
  program VARCHAR(200)
);

CREATE TABLE teacher (
  id INT,
  name VARCHAR(200),
  address VARCHAR(200)
);`
      },
      {
        id: "1.5",
        labNo: "1",
        title: "Verify and Describe Tables",
        question: "List all tables in the selected database and check table properties.",
        filename: "dbms_lab_1_5_verify_tables.sql",
        sql: () => `SHOW TABLES;
DESCRIBE student;
DESCRIBE teacher;`
      },
      {
        id: "1.6",
        labNo: "1",
        title: "Add New Columns",
        question: "Add contactno to student and subject to teacher.",
        filename: "dbms_lab_1_6_add_columns.sql",
        sql: () => `ALTER TABLE student ADD COLUMN contactno VARCHAR(20) NULL;
ALTER TABLE teacher ADD COLUMN subject VARCHAR(50) NULL;

DESCRIBE student;
DESCRIBE teacher;`
      },
      {
        id: "1.7",
        labNo: "1",
        title: "Change Column Data Types",
        question: "Change contactno of student to INT and address of teacher to INT.",
        filename: "dbms_lab_1_7_change_datatypes.sql",
        sql: () => `ALTER TABLE student CHANGE COLUMN contactno contactno INT NULL;
ALTER TABLE teacher CHANGE COLUMN address address INT NULL;

DESCRIBE student;
DESCRIBE teacher;`
      },
      {
        id: "1.8",
        labNo: "1",
        title: "Drop Columns",
        question: "Drop gender from student and address from teacher.",
        filename: "dbms_lab_1_8_drop_columns.sql",
        sql: () => `ALTER TABLE student DROP COLUMN gender;
ALTER TABLE teacher DROP COLUMN address;

DESCRIBE student;
DESCRIBE teacher;`
      },
      {
        id: "1.9",
        labNo: "1",
        title: "Rename Columns",
        question: "Rename name to studentname in student and id to tid in teacher.",
        filename: "dbms_lab_1_9_rename_columns.sql",
        sql: () => `ALTER TABLE student CHANGE COLUMN name studentname VARCHAR(100);
ALTER TABLE teacher CHANGE COLUMN id tid INT;

DESCRIBE student;
DESCRIBE teacher;`
      },
      {
        id: "1.10",
        labNo: "1",
        title: "Drop Tables and Database",
        question: "Drop student table, teacher table, and the created database.",
        filename: "dbms_lab_1_10_drop_objects.sql",
        sql: c => `DROP TABLE student;
DROP TABLE teacher;
SHOW TABLES;

DROP DATABASE ${c.db1};`
      },
      {
        id: "2.1",
        labNo: "2",
        title: "Create and Select Database",
        question: "Create a database lab<yourname> and use it as the current database.",
        filename: "dbms_lab_2_1_create_use_database.sql",
        sql: lab2CreateDatabaseSql
      },
      {
        id: "2.2",
        labNo: "2",
        title: "Create Student Table",
        question: "Create student(id, name, gender, program, contact_number, address).",
        filename: "dbms_lab_2_2_create_student_table.sql",
        sql: lab2CreateStudentTableSql
      },
      {
        id: "2.3",
        labNo: "2",
        title: "Create Teacher Table",
        question: "Create teacher(id, name, subject, contact_number, address, email).",
        filename: "dbms_lab_2_3_create_teacher_table.sql",
        sql: lab2CreateTeacherTableSql
      },
      {

    function highlightSql(sql) {
      let html = esc(sql);
      html = html.replace(/(--.*)$/gm, '<span class="sql-com">$1</span>');
      html = html.replace(/'([^']*)'/g, '<span class="sql-str">\'$1\'</span>');
      html = html.replace(/\b(NULL|SHOW|DATABASES|CREATE|DATABASE|IF|NOT|EXISTS|USE|TABLE|INT|VARCHAR|DESCRIBE|ALTER|ADD|COLUMN|CHANGE|DROP|RENAME|TO|MODIFY|INSERT|INTO|VALUES|SELECT|FROM|WHERE|UPDATE|SET|DELETE|CONSTRAINT|UNIQUE|PRIMARY|KEY|ENUM|CHECK|DEFAULT|INDEX|INFORMATION_SCHEMA|AND)\b/gi, '<span class="sql-key">$1</span>');
      html = html.replace(/\b(\d+)\b/g, '<span class="sql-num">$1</span>');
      return html;
    }

    function toggleCard(id) {

        expanded.add(id);
        body.classList.add("open");
        arrow.classList.add("open");
      }

    function table(headers, rows, options = {}) {
      if (!rows.length) {
        return `<div class="pm-table-wrap"><div class="empty-set">MySQL returned an empty result set.</div></div>`;
      }
      return `
        <div class="pm-table-wrap">
          <table class="pm-table"${options.minWidth ? ` style="min-width:${options.minWidth}px"` : ""}>
            <thead><tr>${headers.map(h => `<th>${esc(h)}</th>`).join("")}</tr></thead>
            <tbody>
              ${rows.map(row => `<tr>${row.map(cell => `<td>${cell === null ? '<span class="null">NULL</span>' : cell}</td>`).join("")}</tr>`).join("")}
            </tbody>
          </table>
        </div>`;
    }

    function outputCards(c) {
      return lab1Outputs(c).concat(lab2Outputs(c));

    function renderOutput() {
      return `<div class="outputs-list">${outputCards(ctx()).join("")}</div>`;
    }

    function render() {
      document.getElementById("contentArea").innerHTML = tab === "report" ? renderReport() : renderOutput();
    }

    function downloadHtml() {
      const nameEl = document.getElementById("studentName");
      const rollEl = document.getElementById("studentRoll");
      const collegeEl = document.getElementById("studentCollege");
      nameEl.setAttribute("value", nameEl.value);
      rollEl.setAttribute("value", rollEl.value);
      collegeEl.setAttribute("value", collegeEl.value);

      const blob = new Blob(["<!DOCTYPE html>\n" + document.documentElement.outerHTML], { type: "text/html;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "DBMS_Lab_Report.html";
      document.body.appendChild(a);
      a.click();
      URL.revokeObjectURL(a.href);
      document.body.removeChild(a);
    }
