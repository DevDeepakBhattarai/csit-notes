<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Theory of Computation Lab Report Generator</title>
  <style>
    @page {
      size: A4;
      margin: 0;
    }

    * {
      box-sizing: border-box;
    }

    :root {
      --screen-bg: #101217;
      --panel: #181c24;
      --panel-2: #202633;
      --line: rgba(255, 255, 255, 0.12);
      --text: #eef2f6;
      --muted: #9aa6b5;
      --orange: #f47b20;
      --blue: #5294d0;
      --green: #2bb673;
      --paper: #ffffff;
      --ink: #121212;
      --paper-width: 210mm;
      --paper-height: 297mm;
      --paper-padding: 10mm;
      --page-border-padding: 5.5mm;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(79, 125, 245, 0.08), transparent 34%),
        linear-gradient(315deg, rgba(52, 211, 153, 0.10), transparent 36%),
        var(--screen-bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    .controls {
      max-width: 1120px;
      margin: 22px auto;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(24, 28, 36, 0.94);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
    }

    .controls-head {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: end;
      border-bottom: 1px solid var(--line);
      padding-bottom: 14px;
      margin-bottom: 14px;
    }

    .controls h1 {
      margin: 0;
      font-size: 23px;
      line-height: 1.2;
      color: #fff;
      letter-spacing: 0;
    }

    .controls p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .input-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(150px, 1fr));
      gap: 10px;
    }

    .field label {
      display: block;
      margin: 0 0 5px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .field input {
      width: 100%;
      padding: 10px 11px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: var(--panel-2);
      color: var(--text);
      outline: none;
      font-size: 13px;
    }

    .field input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(82, 148, 208, 0.16);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 14px;
    }

    .print-btn {
      border: 0;
      border-radius: 6px;
      background: var(--green);
      color: #fff;
      font-weight: 700;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 13px;
    }

    .print-btn:hover {
      filter: brightness(1.05);
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      color: var(--muted);
      font-size: 12px;
      user-select: none;
    }

    .theme-toggle input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .switch {
      width: 46px;
      height: 25px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: #343b49;
      position: relative;
      transition: background 0.2s ease;
    }

    .switch::after {
      content: "";
      position: absolute;
      width: 19px;
      height: 19px;
      top: 2px;
      left: 2px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.32);
      transition: transform 0.2s ease;
    }

    .theme-toggle input:checked + .switch {
      background: var(--blue);
    }

    .theme-toggle input:checked + .switch::after {
      transform: translateX(21px);
    }

    .pages {
      padding: 10px 0 36px;
      overflow-x: auto;
    }

    .report-page {
      width: var(--paper-width);
      height: var(--paper-height);
      margin: 24px auto;
      padding: var(--paper-padding);
      color: var(--ink);
      background: var(--paper);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.36);
      font-family: "Times New Roman", Times, serif;
      overflow: hidden;
    }

    .page-inner {
      height: 100%;
      border: 2px solid #202020;
      padding: var(--page-border-padding);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: #fff;
      min-height: 0;
    }

    .student-footer {
      display: flex;
      justify-content: space-between;
      gap: 10mm;
      border-top: 1px solid #111;
      padding-top: 2.4mm;
      margin-top: 3mm;
      font-size: 11.5pt;
      line-height: 1.25;
      color: #111;
    }

    .student-footer span {
      display: inline-block;
      min-width: 44mm;
      border-bottom: 1px solid #111;
      padding-left: 2mm;
    }

    .page-content {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .content-block {
      break-inside: avoid;
      page-break-inside: avoid;
      margin: 0 0 4.2mm;
    }

    .content-block:last-child {
      margin-bottom: 0;
    }

    .algorithm-block {
      margin-bottom: 1.8mm;
    }

    .question {
      margin: 0;
      font-size: 13pt;
      line-height: 1.38;
      font-weight: 700;
    }

    .section-title {
      font-size: 12pt;
      font-weight: 700;
      font-style: italic;
      margin: 0 0 1.7mm;
      color: #111;
    }

    .info-box,
    .algo-box {
      border: 1px solid #d3d6dc;
      border-radius: 5px;
      background: #f7f8fa;
      padding: 3.5mm;
      font-size: 12.5pt;
      line-height: 1.45;
    }

    .info-box p {
      margin: 0 0 2mm;
    }

    .info-box p:last-child {
      margin-bottom: 0;
    }

    .algo-box ol,
    .algo-box ul {
      margin: 0;
      padding-left: 5.2mm;
    }

    .algo-box li {
      margin: 0 0 1.3mm;
    }

    .plain-code {
      margin: 0;
      padding: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: normal;
      font-family: Consolas, "Courier New", monospace;
      font-size: 10pt;
      line-height: 1.26;
      color: #111;
      background: transparent;
      border: 0;
    }

    .source-code-first-block,
    .code-line-block {
      margin: 0;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .source-code-first-block .section-title {
      margin-bottom: 1.2mm;
    }

    .output-block {
      margin-top: 5mm;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .win-terminal {
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.24), 0 2px 8px rgba(0, 0, 0, 0.16);
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    .win-terminal.dark {
      background: #0c0c0c;
      color: #cccccc;
    }

    .win-terminal.dark .win-titlebar {
      background: #1f1f1f;
      border-bottom: 1px solid #333;
    }

    .win-terminal.dark .win-title-text,
    .win-terminal.dark .win-btn {
      color: #999;
    }

    .win-terminal.dark .t-process {
      color: #e5c07b;
    }

    .win-terminal.dark .t-press {
      color: #666;
    }

    .win-terminal.light {
      background: #fff;
      color: #1e1e1e;
      border: 1px solid #d4d4d4;
      box-shadow: none;
    }

    .win-terminal.light .win-titlebar {
      background: #f3f3f3;
      border-bottom: 1px solid #e0e0e0;
    }

    .win-terminal.light .win-title-text,
    .win-terminal.light .win-btn {
      color: #666;
    }

    .win-terminal.light .t-process {
      color: #9a6a00;
    }

    .win-terminal.light .t-press {
      color: #7a7a7a;
    }

    .win-titlebar {
      display: flex;
      align-items: center;
      height: 30px;
      user-select: none;
    }

    .win-title-text {
      flex: 1;
      font-size: 11px;
      padding-left: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .win-btns {
      display: flex;
      height: 100%;
    }

    .win-btn {
      width: 38px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
    }

    .win-btn svg {
      width: 10px;
      height: 10px;
    }

    .t-body {
      margin: 0;
      padding: 3mm 3.6mm;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-family: Consolas, "Courier New", monospace;
      font-size: 9.4pt;
      line-height: 1.34;
    }

    .index-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12pt;
      line-height: 1.3;
    }

    .index-title {
      margin: 0 0 5mm;
      text-align: center;
      font-size: 17pt;
      line-height: 1.2;
      font-weight: 700;
    }

    .index-table th,
    .index-table td {
      border: 1px solid #cfd4dc;
      padding: 1.6mm 2.6mm;
      vertical-align: middle;
    }

    .index-table th {
      background: #f0f3f7;
      text-align: left;
    }

    .index-table th:first-child,
    .index-table td:first-child {
      width: 24mm;
      text-align: center;
    }

    .index-table th:last-child,
    .index-table td:last-child {
      width: 36mm;
      text-align: center;
    }

    .submitted-date-cell {
      width: 34mm;
      text-align: center;
    }

    .signature-cell {
      height: 7.5mm;
    }

    @media (max-width: 900px) {
      .controls {
        margin: 12px;
      }

      .controls-head {
        display: block;
      }

      .input-grid {
        grid-template-columns: 1fr;
      }

      .report-page {
        width: var(--paper-width);
        height: var(--paper-height);
        min-height: 0;
        margin: 12px 0;
      }
    }

    @media print {
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      body {
        margin: 0;
        padding: 0;
        background: #fff;
      }

      .no-print {
        display: none !important;
      }

      .pages {
        padding: 0;
      }

      .report-page {
        width: var(--paper-width);
        height: var(--paper-height);
        margin: 0;
        box-shadow: none;
        overflow: hidden;
        page-break-after: always;
        break-after: page;
      }

      .report-page:last-child {
        page-break-after: auto;
      }
    }
  </style>
</head>
<body>
  <section class="controls no-print">
    <div class="controls-head">
      <div>
        <h1>Theory of Computation Lab Report Generator</h1>
        <p>Enter student details, choose output theme, then print or save as PDF.</p>
      </div>
      <button class="print-btn" type="button" onclick="window.print()">Print / Save as PDF</button>
    </div>
    <div class="input-grid">
      <div class="field">
        <label for="nameIn">Student Name</label>
        <input id="nameIn" type="text" placeholder="Your full name">
      </div>
      <div class="field">
        <label for="rollIn">Roll / Sec</label>
        <input id="rollIn" type="text" placeholder="e.g. 45/A">
      </div>
    </div>
    <div class="actions">
      <label class="theme-toggle">
        <input id="themeIn" type="checkbox" checked>
        <span class="switch"></span>
        <span>Dark output theme</span>
      </label>
    </div>
  </section>

  <main id="pages" class="pages"></main>

  <script>
    // ==================== DATA ====================
    const P = [
      {
        id: '1',
        title: 'Count lines and characters in a file',
        q: '1. Write a C/C++ program to read a file and Count number of lines and characters in a file.',
        th: 'File handling in C involves opening a file using fopen(), reading its contents character-by-character using fgetc(), and closing it using fclose(). The character count is incremented for every byte read (including whitespaces and control characters), while the line count is incremented every time a newline character (\'\n\') is encountered.',
        code: (nm, rl) => `#include <stdio.h>
#include <stdlib.h>

int main() {
    FILE *fp = fopen("test.txt", "w");
    if (fp != NULL) {
        fprintf(fp, "Theory of Computation\\nLab Report\\nPatan Multiple Campus\\n");
        fclose(fp);
    }
    fp = fopen("test.txt", "r");
    if (fp == NULL) {
        printf("Error opening file.\\n");
        return 1;
    }
    int chars = 0, lines = 0;
    char ch;
    while ((ch = fgetc(fp)) != EOF) {
        chars++;
        if (ch == '\\n') {
            lines++;
        }
    }
    fclose(fp);
    printf("Total Characters: %d\\n", chars);
    printf("Total Lines: %d\\n", lines);
    printf("\\nName: [NAME]  Roll: [ROLL]\\n");
    return 0;
}`,
        out: (nm, rl) => `Total Characters: 55
Total Lines: 3

Name: ${nm}  Roll: ${rl}`
      },
      {
        id: '2',
        title: 'Substring from specified position up to n length',
        q: '2. Write a program to find the substring of a string from specified given position up to n length.',
        th: 'A substring is a contiguous sequence of characters within a string. Extracting a substring from a specified position requires validating that the starting position is within the bounds of the original string and copying up to n characters or until the null terminator is reached.',
        code: (nm, rl) => `#include <stdio.h>
#include <string.h>

void get_substring(const char *src, int pos, int len, char *dest) {
    int src_len = strlen(src);
    int j = 0;
    if (pos >= 0 && pos < src_len) {
        for (int i = pos; i < pos + len && src[i] != '\\0'; i++) {
            dest[j++] = src[i];
        }
    }
    dest[j] = '\\0';
}

int main() {
    char str[] = "TheoryOfComputation";
    char sub[100];
    int pos = 8, len = 11;
    get_substring(str, pos, len, sub);
    printf("Original String: %s\\n", str);
    printf("Substring from index %d of length %d: %s\\n", pos, len, sub);
    printf("\\nName: [NAME]  Roll: [ROLL]\\n");
    return 0;
}`,
        out: (nm, rl) => `Original String: TheoryOfComputation
Substring from index 8 of length 11: Computation

Name: ${nm}  Roll: ${rl}`
      },
      {
        id: '3',
        title: 'Find all substrings of a given string',
        q: '3. Write a program in C/C++ to find all the substrings of a given string.',
        th: 'A string of length L contains L*(L+1)/2 non-empty substrings. Finding all substrings involves systematically varying the starting index of the substring and its length, generating every possible contiguous sequence of characters.',
        code: (nm, rl) => `#include <stdio.h>
#include <string.h>

int main() {
    char str[] = "TOC";
    int len = strlen(str);
    printf("Original String: %s\\n", str);
    printf("All Substrings:\\n");
    for (int i = 0; i < len; i++) {
        for (int j = i; j < len; j++) {
            for (int k = i; k <= j; k++) {
                printf("%c", str[k]);
            }
            printf("\\n");
        }
    }
    printf("\\nName: [NAME]  Roll: [ROLL]\\n");
    return 0;
}`,
        out: (nm, rl) => `Original String: TOC
All Substrings:
T
TO
TOC
O
OC
C

Name: ${nm}  Roll: ${rl}`
      },
      {
        id: '4',
        title: 'List all prefixes of a string',
        q: '4. Write C/C++ program for List out the All Prefix of a String.',
        th: 'A prefix is a substring that starts at the first character of the string. A string of length L has L prefixes (excluding the empty string). Prefix list is obtained by taking substrings starting at index 0 of lengths from 1 to L.',
        code: (nm, rl) => `#include <stdio.h>
#include <string.h>

int main() {
    char str[] = "Patan";
    int len = strlen(str);
    printf("Original String: %s\\n", str);
    printf("All Prefixes:\\n");
    for (int i = 1; i <= len; i++) {
        for (int j = 0; j < i; j++) {
            printf("%c", str[j]);
        }
        printf("\\n");
    }
    printf("\\nName: [NAME]  Roll: [ROLL]\\n");
    return 0;
}`,
        out: (nm, rl) => `Original String: Patan
All Prefixes:
P
Pa
Pat
Pata
Patan

Name: ${nm}  Roll: ${rl}`
      },
      {
        id: '5',
        title: 'List all suffixes of a string',
        q: '5. Write a C/C++ program for Listing out the all suffix of a String.',
        th: 'A suffix is a substring that ends at the last character of the original string. A string of length L has L suffixes (excluding the empty string). Suffixes are obtained by taking substrings starting at index i (where i ranges from L-1 down to 0) extending to the end of the string.',
        code: (nm, rl) => `#include <stdio.h>
#include <string.h>

int main() {
    char str[] = "Campus";
    int len = strlen(str);
    printf("Original String: %s\\n", str);
    printf("All Suffixes:\\n");
    for (int i = len - 1; i >= 0; i--) {
        printf("%s\\n", &str[i]);
    }
    printf("\\nName: [NAME]  Roll: [ROLL]\\n");
    return 0;
}`,
        out: (nm, rl) => `Original String: Campus
All Suffixes:
s
us
pus
mpus
ampus
Campus

Name: ${nm}  Roll: ${rl}`
      },
      {
        id: '6',
        title: 'Leftmost, rightmost, and mid-substring extraction',
        q: '6. Write a program in C or C++ that accepts a string and print the substrings: leftmost of length n, rightmost of length n, and from position m to n.',
        th: 'Leftmost extraction copies characters from index 0 of length n. Rightmost extraction copies n characters starting from length-n. Mid-substring extraction copies characters starting from index m up to index n.',
        code: (nm, rl) => `#include <stdio.h>
#include <string.h>

void leftmost(const char *str, int n, char *dest) {
    int i;
    for (i = 0; i < n && str[i] != '\\0'; i++) {
        dest[i] = str[i];
    }
    dest[i] = '\\0';
}

void rightmost(const char *str, int n, char *dest) {
    int len = strlen(str);
    int start = len - n;
    if (start < 0) start = 0;
    strcpy(dest, &str[start]);
}

void mid_substring(const char *str, int m, int n, char *dest) {
    int j = 0;
    for (int i = m; i <= n && str[i] != '\\0'; i++) {
        dest[j++] = str[i];
    }
    dest[j] = '\\0';
}

int main() {
    char str[] = "TheoryOfComputation";
    char dest[100];
    
    printf("Original String: %s\\n", str);
    
    leftmost(str, 6, dest);
    printf("Leftmost substring of length 6: %s\\n", dest);
    
    rightmost(str, 11, dest);
    printf("Rightmost substring of length 11: %s\\n", dest);
    
    mid_substring(str, 8, 18, dest);
    printf("Substring from position 8 to 18: %s\\n", dest);
    
    printf("\\nName: [NAME]  Roll: [ROLL]\\n");
    return 0;
}`,
        out: (nm, rl) => `Original String: TheoryOfComputation
Leftmost substring of length 6: Theory
Rightmost substring of length 11: Computation
Substring from position 8 to 18: Computation

Name: ${nm}  Roll: ${rl}`
      },
      {
        id: '7',
        title: 'DFA: Set of strings ending at \'b\' from alphabet {a, b}',
        q: '7a. DFA: Set of strings ending at \'b\' from alphabet {a, b}.',
        th: 'A Deterministic Finite Automaton (DFA) consists of states and transition rules. For strings ending in \'b\', the DFA starts in q0 (not ending in \'b\'). If it reads \'a\', it stays in q0. If it reads \'b\', it transitions to q1 (ending in \'b\', accepting state). From q1, reading \'a\' goes back to q0, while \'b\' stays in q1.',
        al: ["Define transition logic where state q0 is initial/reject and q1 is accepting.","Read each character of the input string sequentially.","If character is 'a', transition current state to q0; if 'b', transition to q1.","After processing all characters, check if the final state is q1.","Accept the string if final state is q1, otherwise reject."],
        code: (nm, rl) => `#include <stdio.h>

int dfa_ends_in_b(const char *str) {
    int state = 0;
    for (int i = 0; str[i] != '\\0'; i++) {
        char c = str[i];
        if (c == 'a') {
            state = 0;
        } else if (c == 'b') {
            state = 1;
        } else {
            return -1;
        }
    }
    return (state == 1);
}

int main() {
    const char *test_cases[] = {"ab", "aab", "ba", "b", "aba"};
    printf("DFA Simulation (Ends in 'b' over {a, b}):\\n");
    for (int i = 0; i < 5; i++) {
        int res = dfa_ends_in_b(test_cases[i]);
        printf("String: %-5s -> %s\\n", test_cases[i], res == 1 ? "Accepted" : (res == 0 ? "Rejected" : "Invalid Input"));
    }
    printf("\\nName: [NAME]  Roll: [ROLL]\\n");
    return 0;
}`,
        out: (nm, rl) => `DFA Simulation (Ends in 'b' over {a, b}):
String: ab    -> Accepted
String: aab   -> Accepted
String: ba    -> Rejected
String: b     -> Accepted
String: aba   -> Rejected

Name: ${nm}  Roll: ${rl}`
      },
      {
        id: '8',
        title: 'DFA: Set of strings ending with \'01\' from alphabet {0, 1}',
        q: '7b. DFA: Set of strings ending with \'01\' from alphabet {0, 1}.',
        th: 'To accept strings ending with \'01\', a DFA requires three states: q0 (initial/non-matching), q1 (after reading \'0\'), and q2 (after reading \'01\', accepting state). Transitions: q0 on \'0\'->q1, on \'1\'->q0; q1 on \'0\'->q1, on \'1\'->q2; q2 on \'0\'->q1, on \'1\'->q0.',
        al: ["Set initial state to q0 (0).","Read the input string character-by-character.","Update states: if character is '0', state becomes q1; if character is '1', state becomes q2 if previous was q1, else q0.","If the final state after processing the entire string is q2, accept; else reject."],
        code: (nm, rl) => `#include <stdio.h>

int dfa_ends_in_01(const char *str) {
    int state = 0;
    for (int i = 0; str[i] != '\\0'; i++) {
        char c = str[i];
        if (c == '0') {
            state = 1;
        } else if (c == '1') {
            if (state == 1) {
                state = 2;
            } else {

void init(Stack *s) {

    if (s->top < MAX - 1) {
        s->items[++(s->top)] = val;
    }
}

char pop(Stack *s) {
    if (s->top >= 0) {
        return s->items[(s->top)--];
    }
    return '\\0';

    if (s->top >= 0) {

    }
    return '\\0';

String: abb     -> Rejected

Name: ${nm}  Roll: ${rl}`
      },
      {
        id: '19',
        title: 'Turing Machine Simulation: Palindrome checker over {a, b}',
        q: '12b. Turing Machine Simulation: Palindrome checker over {a, b}.',
        th: 'A TM palindrome checker reads the first character of the tape, replaces it with \'X\' (blank), moves to the right end of the tape to verify the last character matches, replaces that with \'X\', and then returns to the new leftmost char. This repeats until all chars are matched.',
        al: ["Copy input string to a tape representation.","Loop while left index is less than right index.","Check if tape[left] equals tape[right]. If not, reject.","Mark tape[left] and tape[right] with 'X' and adjust indexes.","If the loop completes with all matching, accept as a palindrome."],
        code: (nm, rl) => `#include <stdio.h>
#include <string.h>

int tm_palindrome(const char *input) {
    char tape[100];
    strcpy(tape, input);
    int len = strlen(tape);
    if (len == 0) return 1;

    int left = 0;
    int right = len - 1;

    while (left < right) {
        char first = tape[left];
        char last = tape[right];
        
        if (first != last) return 0;
        
        tape[left] = 'X';
        tape[right] = 'X';
        
        left++;
        right--;
    }
    return 1;
}

int main() {
    const char *test_cases[] = {"aba", "abba", "a", "ab", "baab"};
    printf("Turing Machine (Palindrome Checker over {a, b}):\\n");
    for (int i = 0; i < 5; i++) {
        int res = tm_palindrome(test_cases[i]);
        printf("String: %-5s -> %s\\n", test_cases[i], res ? "Accepted" : "Rejected");
    }
    printf("\\nName: [NAME]  Roll: [ROLL]\\n");
    return 0;
}`,
        out: (nm, rl) => `Turing Machine (Palindrome Checker over {a, b}):
String: aba   -> Accepted
String: abba  -> Accepted
String: a     -> Accepted
String: ab    -> Rejected
String: baab  -> Accepted

Name: ${nm}  Roll: ${rl}`
      }
    ];

    // ==================== STATE / RENDER ====================
    let renderCycle = 0;

    function esc(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function getValue(id, fallback) {
      const input = document.getElementById(id);
      const value = input ? input.value.trim() : "";
      return value || fallback;
    }

    function currentStudent() {
      return {
        name: getValue("nameIn", "______________________________"),
        roll: getValue("rollIn", "______________")
      };
    }

    function currentTheme() {
      return document.getElementById("themeIn").checked ? "dark" : "light";
    }

    function studentFooterHtml(student) {
      return `
        <div class="student-footer">
          <div>Name: <span>${esc(student.name)}</span></div>
          <div>Roll / Sec: <span>${esc(student.roll)}</span></div>
        </div>`;
    }

    function createPage(container, student, showFooter) {
      const page = document.createElement("section");
      page.className = "report-page";
      const inner = document.createElement("div");
      inner.className = "page-inner";
      inner.innerHTML = `<div class="page-content"></div>${showFooter ? studentFooterHtml(student) : ""}`;
      page.appendChild(inner);
      container.appendChild(page);
      return inner.querySelector(".page-content");
    }

    function paginate(container, student, item, blocks) {
      const showFooter = item.showFooter !== false;
      let content = createPage(container, student, showFooter);

      blocks.forEach((block) => {
        content.appendChild(block);
        if (content.scrollHeight > content.clientHeight + 2) {
          content.removeChild(block);
          content = createPage(container, student, showFooter);
          content.appendChild(block);
        }
      });
    }

    function makeBlock(html, extraClass) {
      const block = document.createElement("div");
      block.className = "content-block" + (extraClass ? " " + extraClass : "");
      block.innerHTML = html;
      return block;
    }

    function slug(text) {
      const clean = String(text || "student").toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_+|_+$/g, "");
      return clean || "student";
    }

    function executableName(id) {
      return `program${id}.exe`;
    }

    function theoryHtml(item) {
      if (!item.th) return "";
      return `
        <div class="section-title">Theory:</div>
        <div class="info-box">${esc(item.th)}</div>`;
    }

    function algorithmHtml(item) {
      if (!item.al || !item.al.length) return "";
      return `
        <div class="section-title">Algorithm / Steps:</div>
        <div class="algo-box"><ol>${item.al.map((step) => `<li>${esc(step)}</li>`).join("")}</ol></div>`;
    }

    function codeLineHtml(line, index) {
      const codeLine = line === "" ? "&nbsp;" : esc(line);
      return `${index === 0 ? '<div class="section-title">Source Code:</div>' : ''}<pre class="plain-code">${codeLine}</pre>`;
    }

    function terminalBlockHtml(item, outputText, theme, student) {
      const title = `C:\\${slug(student.name)}\\toc\\${executableName(item.id)}`;
      return `
        <div class="section-title">Output:</div>
        <div class="win-terminal ${theme}">
          <div class="win-titlebar">
            <div class="win-title-text">${esc(title)}</div>
            <div class="win-btns">
              <div class="win-btn"><svg viewBox="0 0 10 1" fill="currentColor"><rect width="10" height="1"></rect></svg></div>
              <div class="win-btn"><svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1"><rect x="0.5" y="0.5" width="9" height="9"></rect></svg></div>
              <div class="win-btn"><svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.2"><line x1="1" y1="1" x2="9" y2="9"></line><line x1="9" y1="1" x2="1" y2="9"></line></svg></div>
            </div>
          </div>
          <pre class="t-body">${esc(outputText)}${outputText.trim() ? "\n\n" : ""}<span class="t-process">Process exited after 0.0234 seconds with return value 0</span>
<span class="t-press">Press any key to continue . . .</span></pre>
        </div>`;
    }

    function buildItemBlocks(item, student, theme) {
      const blocks = [];
      blocks.push(makeBlock(`<p class="question">${esc(item.q)}</p>`));

      const theory = theoryHtml(item);
      if (theory) blocks.push(makeBlock(theory));

      const algorithm = algorithmHtml(item);
      if (algorithm) blocks.push(makeBlock(algorithm, "algorithm-block"));

      if (item.code) {
        let filledCode = item.code(student.name, student.roll);
        filledCode = filledCode.replace(/\[NAME\]/g, student.name).replace(/\[ROLL\]/g, student.roll);
        filledCode.split("\n").forEach((line, index) => {
          blocks.push(makeBlock(codeLineHtml(line, index), index === 0 ? "source-code-first-block" : "code-line-block"));
        });
      }

      if (item.out) {
        const filledOutput = item.out(student.name, student.roll);
        blocks.push(makeBlock(terminalBlockHtml(item, filledOutput, theme, student), "output-block"));
      }

      return blocks;
    }

    function buildIndexBlocks() {
      const blocks = [makeBlock(`
        <h2 class="index-title">Index</h2>
        <table class="index-table">
          <thead>
            <tr><th>S.No.</th><th>Experiment / Question</th><th>Submitted Date</th><th>Signature</th></tr>
          </thead>
          <tbody>${P.map((item) => `
            <tr>
              <td>${esc(item.id)}</td>
              <td>${esc(item.title)}</td>
              <td class="submitted-date-cell">2083/04/__</td>
              <td class="signature-cell"></td>
            </tr>`).join("")}</tbody>
        </table>`)];

      return blocks;
    }

    function renderReport() {
      renderCycle++;
      const student = currentStudent();
      const theme = currentTheme();
      const container = document.getElementById("pages");
      container.innerHTML = "";

      paginate(container, student, { id: "Index", title: "Index Page", showFooter: false }, buildIndexBlocks());
      P.forEach((item) => {
        paginate(container, student, item, buildItemBlocks(item, student, theme));
      });
    }

    ["nameIn", "rollIn", "themeIn"].forEach((id) => {
      document.getElementById(id).addEventListener("input", renderReport);
      document.getElementById(id).addEventListener("change", renderReport);
    });

    renderReport();
  </script>
</body>
</html>
